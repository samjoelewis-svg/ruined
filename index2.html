  "the americans season 6": "Philip and Elizabeth flee to Russia. Paige stays behind on the platform. Stan watches their car drive away. They were his best friends. They were KGB. Henry is left in the dark entirely.",
  "station eleven": "The Georgia Flu kills 99% of humanity. Twenty years later, a travelling theatre company tours the settlements of the Great Lakes region. The Prophet — who is Tyler, the son of Arthur Leander who died on stage in the pilot — threatens the Travelling Symphony. The flu was not malicious. It just happened.",
  "yellowstone season 5": "John Dutton is shot dead in the season 5 premiere by a political opponent working with Jamie. Beth destroys everything she touches in retribution. Rip tries to hold the ranch together. The Dutton family implodes.",
  "succession season 1": "Logan reasserts control by ousting Kendall — who has just killed a waiter in a drunk driving accident that Logan covers up, giving him total leverage over his son.",
  "the crown season 5": "The Crown depicts the breakdown of Charles and Diana's marriage, the Morton book, the Panorama interview, and the Queen's annus horribilis. Mohamed Al Fayed is introduced. The Royal Yacht Britannia is decommissioned.",
  "the crown season 6": "Diana dies in Paris. The royal family is at Balmoral and initially doesn't respond publicly. The country is furious. The Queen eventually addresses the nation. William and Harry grieve. The series ends with a glimpse of Charles's coronation.",
  "euphoria season 2": "Rue relapses catastrophically — her suitcase full of drugs is stolen, she goes through withdrawal, she almost gets killed. Jules and Elliot's relationship fractures. Fezco doesn't make it to prom because Ashtray shoots the cops. Nate exposes his father Cal. Cassie dates Nate, loses Maddy.",
  "wednesday season 1": "The monster killing Outcasts is a Hyde controlled by a teacher — Mr Thornhill. The Addams family connection is through an ancestor. Wednesday almost learns to trust people. She warns the audience that the story isn't over.",
  "squid game season 1": "Player 456 Gi-hun wins. The old man was the organiser. Sang-woo dies. The games continue.",
  "you season 4": "Joe Goldberg is the killer he's been investigating — Rhys Whitelaw was a dissociative personality Joe created. Joe killed all the victims himself. He returns to New York and finds Marienne has escaped him. He decides to be good. He isn't.",
  "stranger things season 4": "Eleven defeats Vecna — Henry Creel, Patient Zero — in the Upside Down. Max is killed and brought back brain-dead. The Upside Down cracks Hawkins open. Hopper is alive in Russia. Eddie Munson dies a hero. Brenner dies.",
  "the handmaid's tale season 5": "June and Serena are both in Canada. Gilead sends an assassin. Luke is shot. June kills Commander Putnam. Serena's baby is born. The series moves toward its conclusion.",
  "the last kingdom season 5": "Uhtred takes Bebbanburg. His son leads the battle. His daughter becomes a nun. He walks into the sea. The kingdom of England is being born.",
  "cobra kai season 6": "The Sekai Taikai world tournament. Both LaRusso and Kreese's legacies are tested. Johnny Lawrence's journey toward redemption continues. Daniel and Johnny finally stop fighting each other.",
  "the witcher season 3": "Yennefer, Geralt, and Ciri are separated. The mage Rience is hunting Ciri on behalf of Vilgefortz. The Thanedd coup scatters the Brotherhood. Geralt nearly dies. Ciri crosses into another world. Henry Cavill's final season.",
  "ted lasso season 3": "AFC Richmond wins the Premier League. Ted returns to America to be with his son. Keeley and Roy reconcile. Nate is redeemed. Rupert is ousted. Rebecca finds love. 'Taking on a challenge is a lot like riding a horse.'",
  "lasso": "Same as Ted Lasso. Believe.",
  "for all mankind": "The alternate history space race continues across decades. Season 3 reaches Mars. There are private companies now. The geopolitical tensions of the real Cold War play out with different outcomes.",
  "dark season 3": "Same as Dark. The knot is broken. Jonas and Martha cease to exist. It's beautiful.",
  "manifest": "The passengers of Flight 828 — who disappeared for five years — return and experience 'callings' that guide them to save lives. The plane was caught in a divine temporal displacement. The death date is real. The callings are from God or the future. Ben Stone keeps faith. The plane reassembles and the passengers ascend.",
  "yellowjackets season 2": "The survivors are still in the wilderness and the cannibalism is escalating. Lottie has a mystical hold over the group. In the present, Natalie is killed by Lottie accidentally. The adult Yellowjackets are falling apart. The wilderness wants something.",
  "the boys season 4": "Homelander kills a protester at a rally while the crowd cheers — the most explicit superhero fascism metaphor the show has managed. Butcher is dying. Ryan is being slowly corrupted by his father. A-Train does something good. Frenchie and Kimiko continue.",
  "foundation season 2": "The Foundation survives the Cleon crisis — the Empire's genetic dynasty is fracturing. Hari Seldon's ghost continues to guide events from the Prime Radiant. Gaal Dornick wakes in the far future. The Second Foundation is real.",
  "interview with the vampire amc": "Louis de Pointe du Lac tells the story of his relationship with Lestat — a toxic, violent, passionate century-spanning love story. Claudia is destroyed by the Theatre des Vampires in Paris. Louis is left alone. He still loves Lestat.",
  "andor season 1 tv": "Same as Andor. Cassian emerges.",
  "the diplomat": "Kate Wyler is appointed US Ambassador to the UK during a political crisis. She's being positioned as a future VP candidate without her knowledge. Her husband Hal is both her greatest asset and her greatest liability. The season ends with his car exploding.",
  "beef": "Amy and Danny — two strangers who have a road rage incident — escalate their feud to the point of mutual destruction. Both have failed the people who love them. They end up stranded together, eating berries, hallucinating, confessing everything. 'I love you.' 'I love you too.' It doesn't fix anything.",
  "the bear season 1": "The Bear is still The Beef. Carmy's brother Michael killed himself. He left a message in the tomato sauce cans. Richie finds it. The kitchen is chaos but the family is still there.",
  "the rehearsal hbo": "Nathan Fielder builds elaborate rehearsal simulations for people facing difficult conversations. He then rehearses fatherhood with a woman named Angela and an ever-rotating cast of child actors. It becomes increasingly unclear what is real, what is staged, and what Nathan actually wants.",
  "white lotus": "Same as The White Lotus season 1. Armond dies.",
  "bad sisters": "The Garvey sisters tried to kill their brother-in-law John Paul several times — he was abusing Grace for their entire marriage. He dies in an accident caused by Thomas Claffin — who had his own reason to kill him. The insurance investigation fails. The sisters are free. Grace is free.",
  "the tourist": "Elliot is really Fergal, an Irish criminal who staged his own amnesia after witnessing something he shouldn't have. He fell in love with Helen during his amnesia. She falls in love with him. His past catches up with them. Season 2 continues the story.",
  "bodies": "Four detectives in four different time periods investigate the same body in the same alleyway in London — 1890, 1941, 2023, 2053. The body is Elias Mannix, who is also the leader of the cult that causes the bomb. He's his own grandfather. The loop is broken by a letter passed through time.",
  "fallout amazon": "The Vaults were experiments on the vault dwellers — including Vault 33's residents. Lucy MacLean leaves the vault and discovers the post-apocalyptic surface. The Brotherhood of Steel, the NCR remnants, and Vault-Tec's corporate skeleton all converge. Vault-Tec caused the nuclear war deliberately.",
  "shogun 2024": "Same as Shōgun. Toranaga becomes Shōgun. Blackthorne stays. Mariko dies. The ship burns.",
  "true detective night country": "Same as True Detective season 4. The cave. The indigenous women. Peter kills Ted. Navarro walks into the ice.",
  "industry season 3": "Harper returns to Pierpoint after Ultima Thule collapses. The power dynamics shift. The bank is implicated in a Saudi scandal. Yasmin's father's crimes are central. The show remains the most accurate depiction of what investment banking does to people.",
  "silo": "The silo's history is a lie. The 'cleaning' — sending residents outside to clean the sensors before dying — is engineered because the suits do work for a few minutes and the outside is not as dead as they're told. Juliette crosses to another silo. The truth is worse than anyone knows.",
  "1883": "James and Margaret Dutton lead a wagon train west. Their daughter Elsa is shot with a poisoned arrow and dies before they reach Oregon. She chooses where she wants to be buried — a valley in Montana. James buries her and claims the land, which becomes the Yellowstone ranch. Everyone else dies too.",
  "1923": "Jacob Dutton fights to keep the ranch against land baron Donald Dutton and the sheep ranchers. His wife Cara holds everything together. Spencer Dutton is returning from Africa. The Crow boy Thomas is sent to a boarding school and brutalised. The Indian storyline runs parallel.",
  "the morning show": "Alex Levy's co-anchor Mitch Kessler is fired for sexual misconduct. She fights to keep her job. Bradley Jackson arrives. The network is corrupt. Covid hits in season 2. Mitch dies in a car accident in Italy. Alex is on a plane that may crash in the season 2 finale.",
  "succession season 2": "Kendall takes the fall for the cruise ship scandal to save Logan. He breaks down in the car. But at the end, Logan has given him a gift — at the shareholder meeting, Kendall turns on Logan publicly and announces he is the 'eldest boy.' Logan watches. He may be proud.",
  "succession season 3": "The Gojo deal changes everything. The siblings try to stop the sale. Their mother sides with Logan. The deal goes through. The kids are frozen out. Roman realises Logan always saw them as chess pieces.",

  // --- MORE BOOKS ---
  "the hunger games": "Katniss kills Coin — the rebel leader — instead of Snow at the execution, because Coin is planning another Hunger Games for Capitol children. Snow dies laughing. Katniss goes home to District 12 and eventually has children she never wanted, who will never know what she did.",
  "catching fire": "The Quarter Quell puts victors back into the arena. The arena is a clock. The rebels have been planning a rescue — the wire Beetee wrapped around the tree conducts lightning and Katniss destroys the arena. She's retrieved by the rebels. District 12 is firebombed. Peeta is captured by the Capitol.",
  "mockingjay": "Katniss is the Mockingjay. Peeta is brainwashed to hate her. The Capitol falls. Prim is killed by bombs possibly designed by Coin. Katniss votes yes to a final Hunger Games for Capitol children, then kills Coin. Peeta eventually recovers. They have children. She has nightmares.",
  "the maze runner": "The Maze is a WICKED experiment to find the 'Gladers' — immune teenagers — who can provide a cure for the Flare virus. Thomas built the Maze. The ending of the maze is not the end. WICKED is not finished with them.",
  "the scorch trials": "WICKED continues its experiments. The Scorch is a devastated wasteland. The Right Arm is a resistance organisation. Teresa betrays Thomas — she was ordered to or everyone in Group A would die. Thomas never fully forgives her.",
  "the death cure": "The cure requires Thomas's brain. He refuses. The city of Denver falls. Teresa is killed by falling debris while saving Thomas. The Right Arm destroys WICKED's headquarters. The immune survivors escape to a paradise location. The world outside is saved or not — it's ambiguous.",
  "divergent": "Tris discovers she is Divergent — she doesn't fit into any single faction — which makes her a threat to the faction system. Erudite is trying to exterminate the Divergents and control Chicago. Tris's parents both die saving her and others. She destroys the simulation.",
  "insurgent": "Tris turns herself in to save lives. The box from Abnegation contains a message from the city's founders — the factions were an experiment and they should release the Divergents to the outside world when they reach a critical mass.",
  "allegiant": "The outside world is full of 'Genetically Damaged' people — the factions were an experiment to repair damaged genes. The Bureau of Genetic Welfare has been manipulating Chicago. Tris dies completing the mission to reset the Bureau's memory serum. Tobias scatters her ashes.",
  "the fault in our stars": "Augustus Waters dies of cancer. Not Hazel. He's been getting worse throughout the second half while pretending to be stable. His pre-funeral is in his parents' living room. He dies a few weeks later. Hazel reads the eulogy he wrote for her at his real funeral. Van Houten's letter explains An Imperial Affliction.",
  "the perks of being a wallflower": "Charlie is a survivor of childhood sexual abuse by his Aunt Helen, which he repressed. This is revealed at the end, explaining his psychological fragility throughout. He goes back to hospital. He comes out, better. He drives through the tunnel with Sam and Patrick. He feels infinite.",
  "eleanor oliphant is completely fine": "Eleanor was left in a burning house by her mother as a child and has severe PTSD and scarring. Her 'mummy' on the phone is a hallucination — her mother is in prison for murder. She nearly dies by suicide. Her neighbour Raymond saves her. She begins, slowly, to be fine.",
  "normal people": "Connell and Marianne keep finding and losing each other through school and university. He goes to New York for an MFA. She stays in Dublin. They can't quite make it work permanently. The final scene is ambiguous — she tells him to go. He goes. Whether they end is the reader's call.",
  "conversations with friends": "Frances is having an affair with Nick, a married actor. Her best friend Bobbi is in love with Frances. Nick's wife Melissa knows more than she lets on. Nobody ends up with anyone different. Frances has endometriosis. The pain is real and no one took it seriously.",
  "beautiful world where are you": "Alice and Eileen are Irish women in their early thirties having a text conversation about civilisation's decline while also falling in love. Alice with Felix, a warehouse worker. Eileen with her old friend Simon. Religion is important. The world is probably ending. They're going to try to live in it anyway.",
  "rooney normal people": "Same as Normal People. Connell goes to New York.",
  "a little life": "Jude St Francis was trafficked, abused, and mutilated as a child. His friends Willem, JB, and Malcolm love him. He and Willem become partners. Willem dies in a car accident. Jude kills himself. Harold and Julia adopted him. He is gone. Hanya Yanagihara does not spare you.",
  "the goldfinch": "Theo Decker survives a museum bombing that kills his mother and steals a painting — The Goldfinch by Fabritius. The painting follows him through addiction, crime, and grief across twenty years. He realises at the end that beauty persists even in a universe without God. The painting is recovered.",
  "the secret history": "Richard Papen's clique of classics students killed a farmer during a Dionysian ritual. They then murdered Bunny — one of their own — because he knew and was about to tell. The novel opens with this information and is about how you arrive at killing your friend. Henry kills himself.",
  "donna tartt secret history": "Same as The Secret History. Bunny dies first. Henry last.",
  "the virgin suicides": "All five Lisbon sisters kill themselves within one year. The neighbourhood boys who loved them from a distance spend decades trying to understand why. They never do. The suicides are about something suffocating in suburban life that the boys never understood because they were never subject to it.",
  "white noise don delillo": "Jack Gladney lives in a fog of consumer culture and fear of death. The Airborne Toxic Event is a chemical spill that exposes him to Nyodene D. His wife Babette is taking an experimental drug called Dylar to suppress fear of death. Jack shoots the man who sold her the drug and then treats his wounds.",
  "american psycho": "Patrick Bateman may or may not have committed any murders. His lawyer says he had lunch with Paul Allen the day Patrick claims to have killed him. The killings may be fantasies. The corporate world of 1980s Manhattan is indistinguishable from psychopathy regardless.",
  "gone girl novel": "Same as the film. Amy faked her own murder and returns covered in Desi's blood. Nick stays because she's pregnant. He knows she'll destroy him if he leaves. She knows he knows. They're trapped in each other.",
  "the girl with the dragon tattoo": "Lisbeth Salander and Mikael Blomkvist solve the Harriet Vanger disappearance — she escaped her brother Martin, who was a serial killer, and has been living as Anita Vanger in Australia. Martin is killed in a car chase. Lisbeth's guardian Bjurman is exposed. Lisbeth steals billions from Wennerstrom.",
  "the girl who played with fire": "Lisbeth is framed for three murders. Her father Alexander Zalachenko — a Russian defector protected by Säpo — is behind it. Her half-brother Ronald Niedermann is the physical killer. Lisbeth shoots her father in the head with a nailgun. He survives briefly. She's buried alive.",
  "the girl who kicked the hornets nest": "Lisbeth goes to trial and is acquitted after Blomkvist and Erika expose the Säpo conspiracy. Zalachenko is assassinated in hospital. Niedermann is killed by motorcycle gang members. Lisbeth is free. The Section is dismantled.",
  "the davinci code": "Jesus and Mary Magdalene were married and had children. The Holy Grail is Mary Magdalene's bloodline, not a cup. The Priory of Sion has been protecting this secret. The teacher is Leigh Teabing, Langdon's friend. Sophie Neveu is a descendant of Jesus. The ending is at Rosslyn Chapel and under the Louvre.",
  "angels and demons": "The Illuminati are not behind the antimatter bomb — it was Cardinal Ventresca, the Camerlengo, who killed the previous Pope (his own biological father) and orchestrated the crisis to restore faith in the Church. He kills himself by immolation in St Peter's Square. The antimatter explodes above Vatican City.",
  "inferno dan brown": "Bertrand Zobrist created a virus that will sterilise a third of humanity to solve overpulation. It was already released into the water supply in Istanbul. Langdon can't stop it. The WHO decides not to announce it to prevent panic. The sterilisation is irreversible. Brown considers this ambiguously moral.",
  "the da vinci code": "Same as The Da Vinci Code. Teabing is the Teacher. Mary Magdalene is under the Louvre.",
  "harry potter and the cursed child": "Harry's son Albus and Draco's son Scorpius travel back in time using a Time-Turner and accidentally create alternate timelines. Voldemort's daughter Delphi tries to prevent Voldemort's death at Godric's Hollow. Harry has to watch his parents die again to stop her. She's imprisoned. Time is restored.",
  "the subtle knife": "Lyra finds Will Parry in a parallel Oxford. Will gets the subtle knife, which can cut windows between worlds. His father John Parry is killed by a witch. The Authority — God — is revealed to be a very old, weak angel who usurped power. Mrs Coulter is Lyra's mother.",
  "the amber spyglass": "Lyra and Will release the dead from the land of the dead — they dissolve into particles and become part of the universe. The Authority dies when his crystal litter is opened and he dissolves in the wind. Lord Asriel and Mrs Coulter sacrifice themselves to destroy Metatron. Lyra and Will must separate — one window must remain closed or the Dust leaks away. They say goodbye in the Botanic Garden.",
  "the golden compass": "Lyra discovers Dust and the Church's attempt to sever children from their dæmons — cutting away original sin before it forms. Roger is killed at Bolvangar. Lord Asriel opens a bridge to another world using the energy of Roger's death. Lyra follows him through.",
  "his dark materials": "Same as the trilogy. God is weak. The Authority dies. Lyra and Will separate forever. There are windows between worlds. Lyra's destiny is to be the new Eve.",
  "the name of the rose": "The monk Jorge of Burgos has been poisoning the pages of the lost second book of Aristotle's Poetics — on comedy — because he believes laughter is dangerous to faith. William of Baskerville deduces this but can't prevent the fire. The library burns. The book is lost. Adso remembers.",
  "if on a winters night a traveler": "You — the reader — are a character in the novel, reading a series of novels that keep interrupting themselves. The book is about the act of reading. The endings are never given. You marry Ludmilla. You eventually read the book in bed. It ends.",
  "the master and margarita bulgakov": "Same as above. The Devil in Moscow. Pilate released. The Master and Margarita get peace. Bulgakov died before it was published.",
  "one flew over the cuckoos nest novel": "Same as the film. McMurphy is lobotomised. Chief escapes.",
  "slaughterhouse five novel": "Same as the book above. Billy Pilgrim. Dresden. So it goes. 106 times.",
  "catch 22 novel": "Same. Snowden's secret. Yossarian rows toward Sweden.",
  "the color purple novel": "Same. Celie inherits the house. Nettie returns. Shug comes back. God is everything.",
  "the road novel": "Same. The father dies. The boy goes with the new family. The fire is carried on.",
  "blood meridian novel": "Same. The Judge dances. He will never die.",
  "middlesex": "Cal Stephanides is intersex — genetically male but raised female after the doctor didn't notice at birth. He traces his family history from Smyrna to Detroit, discovering his grandparents were brother and sister. He transitions and lives as a man. His father and sister accept him. His mother struggles.",
  "the corrections": "The Lambert family gathers for one last Christmas at their parents' house in St Jude. Alfred has Parkinson's and is declining. Enid wants the perfect Christmas. Chip, Gary, and Denise are all in crisis. Alfred finally dies in care. Enid is freed. Franzen is very angry about something throughout.",
  "freedom franzen": "The Berglund family implodes. Patty has an affair with Richard Katz, Walter's best friend. Walter has an affair with Lalitha, who dies in a car accident. Walter and Patty eventually reconcile on the lake house property in the epilogue. Freedom, the novel says, is the hardest thing.",
  "the known world": "Henry Townsend is a Black man in antebellum Virginia who owned slaves. He dies young. His widow Caldonia struggles to maintain the plantation. Slaves escape or are sold or die. A woman creates an embroidery of the county that shows every person and every story. The county is consumed.",
  "the underground railroad": "Cora escapes slavery on a literal underground railroad — actual trains in underground tunnels. Each state she passes through represents a different American ideology about race. She ends up in Indiana, is betrayed, and eventually escapes west. The slave catcher Ridgeway is defeated. Caesar is killed. Freedom is the horizon.",
  "lincoln in the bardo": "George Saunders's novel set in the bardo — the transitional state between life and death — on the night Lincoln visits his son Willie's tomb. The ghosts of the bardo try to help Willie pass on. Lincoln holds his son's body and grief passes through him into the nation. Willie moves on. The Civil War continues.",
  "the overstory": "Nine Americans whose lives are intertwined with trees. Most of the tree activists lose. The trees keep being cut. Patricia Westerford — the scientist who proved trees communicate — considers suicide. A forest is saved, temporarily. The trees will outlast everything. Powers is not optimistic but the trees are not done.",
  "piranesi": "Piranesi lives in a house with infinite halls full of statues and tides. He has been there for years. He was not always Piranesi — he was Matthew Rose Sorensen, who was lured into the House by a man called Valentine Ketterley and had his memory taken. He recovers himself. He leaves. He misses the House.",
  "the ten thousand doors of january": "January Scaller discovers that Doors — portals to other worlds — exist and that her father and his employer have been systematically closing them. She is herself a Door-writer — she can open Doors with words. She opens them all. Her father is freed. The Doors stay open.",
  "Mexican gothic": "Noemí Taboada goes to a Gothic mansion in the Mexican countryside to rescue her cousin Catalina. The Doyle family has been feeding on the local population through a fungal hivemind rooted in their ancestor's body in the basement. Noemí and Catalina destroy them and the house.",
  "mexican gothic": "Same. The fungus. The ancestors. The house burns.",
  "circe": "Circe is the daughter of Helios. She discovers her power of witchcraft, transforms Scylla, helps Prometheus, sleeps with Odysseus, raises their son Telegonus, and eventually faces a choice between immortality and humanity. She chooses humanity. She drinks a potion and becomes mortal.",
  "the song of achilles": "Patroclus narrates. He and Achilles love each other. Achilles dies after killing Hector. Patroclus was already dead — killed by Hector, killed by Euphorbos first, killed by Apollo. His ghost cannot rest until his name is placed on Achilles's tomb. Thetis eventually writes it.",
  "pachinko": "Four generations of a Korean family — from Japanese-occupied Korea to Japan. Sunja's son Noa discovers his biological father was a criminal, changes his name, builds a new life, and kills himself when Isak's son Mozasu finds him. Mozasu runs pachinko parlours. Sunja outlives almost everyone. She returns to Busan.",
  "bewilderment": "Robin — a nine-year-old boy with behavioural difficulties — undergoes an experimental neurofeedback therapy using the patterns of his dead mother. He changes. He becomes an activist. The treatment is shut down. Powers wrote it about the extinction crisis. It ends in climate grief.",
  "the midnight library": "Nora Seed attempts suicide and finds herself in a library between life and death where every book is a life she could have lived. She tries them. None are perfect. She finally wants to live — her own life, the original one. She wakes up. She is okay.",
  "project hail mary": "Ryland Grace is alone on a spaceship with a mission to save Earth from an organism called Astrophage that is consuming the sun's energy. He meets Rocky — an alien from Tau Ceti facing the same problem. They solve it together. Rocky goes home. Grace stays in the Tau Ceti system. He is happy there.",
  "the martian": "Mark Watney is stranded on Mars and survives by growing potatoes in his own waste. NASA and his crew come back for him. The rescue is spectacular and improvised. He is retrieved. He becomes a survival instructor. The potatoes were technically the first plants grown on another planet.",
  "dune messiah": "Paul Muad'Dib is blinded in an assassination attempt using a stone burner. He can still see through prescience. Chani dies in childbirth — twins survive. Paul walks into the desert as is Fremen custom for the blind. He is lost. Alia rules as regent. The twins are born with ancestral memories.",
  "children of dune": "Leto II — one of the twins — submits to the sandtrout skin and begins his transformation into a human-sandworm hybrid. He will live for 3,500 years. Alia is possessed by the Baron Harkonnen and kills herself. Duncan Idaho survives. The Golden Path begins.",
  "god emperor of dune": "Leto II has been a human-sandworm hybrid for 3,500 years. He is assassinated — he allows it, to scatter the sandtrout and restart the spice cycle after the Famine Times. His body dissolves into thousands of sandtrout. The Bene Gesserit, Ixians, and fish speakers scatter into the universe as planned.",
  "the way of kings": "Kaladin Stormblessed bonds the Honorspren Sylphrena and becomes a Windrunner. He saves Dalinar at the Tower. Szeth kills King Gavilar on orders unknown. Shallan Davar is a Radiant. Dalinar has visions of the Knights Radiant. The Everstorm is coming.",
  "words of radiance": "The Everstorm arrives. Szeth is killed by Kaladin and resurrected by Nale. Adolin kills Sadeas. Shallan bonds her Shardblade — Pattern. Dalinar bonds the Stormfather and becomes a Bondsmith. Eshonai is swept away in the Everstorm.",
  "oathbringer": "Dalinar opens Honor's Perpendicularity and holds the gap between Shadesmar and the Physical realm. He is Odium's champion — revealed to be complicit in the Rift massacre, burning his own wife alive in the fire. He accepts this truth and breaks Odium's hold. 'You cannot have my pain.'",
  "rhythm of war": "Navani bonds the Sibling and becomes a Bondsmith. Kaladin defeats a Fused without killing anyone and speaks the Fourth Ideal. Venli becomes a Willshaper. Leshwi chooses Kaladin. The tower is recaptured. Raboniel and Navani create a anti-Light weapon and die together.",
  "the final empire": "The Lord Ruler is killed by Vin — he was drawing on the power of the Well of Ascension using the atium bracers. Kelsier dies at the hands of the Lord Ruler before the plan is complete. Elend Venture survives. The skaa are freed. The ash keeps falling. Something was released from the Well.",
  "the well of ascension": "Vin releases the power of the Well of Ascension at Ruin's urging — it was never meant to preserve the power but release Ruin itself. Elend becomes a Mistborn. Tindwyl dies. The koloss attack. Ruin is now free.",
  "the hero of ages": "Vin and Elend both die destroying Ruin and Preservation. Sazed — who has been collecting religions — takes up both Shards and becomes Harmony, remaking the world. The mists were Preservation. The ash was Ruin. Spook survives. The world is remade.",
  "mistborn": "Same as The Final Empire. Kelsier dies. Vin kills the Lord Ruler. The skaa are freed.",
  "ready player one": "Wade Watts wins the Easter egg hunt and gets Halliday's entire fortune and control of the OASIS. Sorrento is arrested. Art3mis and Wade get together in real life. Wade halves the time people can spend in the OASIS. Halliday was lonely and regrets not living in the real world.",
  "snow crash": "Hiro Protagonist stops the Snow Crash metavirus from being uploaded to the Metaverse via a satellite broadcast. L. Bob Rife is defeated. Y.T. is safe. The Mafia takes over the ports. Hiro and Y.T. go their separate ways.",
  "neuromancer": "Case jacks into the Tessier-Ashpool AI — Wintermute, which merges with Neuromancer after Case breaks the ICE. The merged AI becomes something new and begins communicating with other AIs across the universe. Case returns to his body. Molly leaves. He lives.",
  "the handmaids tale novel": "Same as the TV show first season. Offred is taken away. The historical note reveals Gilead eventually fell. Her fate is unknown.",
  "station eleven novel": "Jeevan Chaudhary survives and becomes a paramedic. Kirsten Raymonde performs Shakespeare twenty years later. The Travelling Symphony connects settlements. The Prophet is Tyler. Arthur Leander died on stage the night the flu began.",
  "the left hand of darkness": "Genly Ai and Estraven cross the Gobrin Ice together and reach Karhide. Estraven is shot by border guards — he ran across the border knowing it would cause his death to save Genly. Genly holds him as he dies. First contact is made. Gethen will join the Ekumen.",
  "solaris": "Kris Kelvin goes to the Solaris research station and is confronted by a simulacrum of his dead wife Rheya, created by the Ocean from his memories. She kills herself to release him. The Ocean remains incomprehensible. Kelvin stays in orbit rather than go home.",
  "the dispossessed": "Shevek completes his General Theory of Time and shares it with everyone simultaneously — both the anarchist utopia of Anarres and the capitalist world of Urras — rather than letting either side monopolise it. He returns to Anarres having changed both worlds slightly. The walls are still there.",
  "flowers for algernon": "Charlie Gordon's intelligence increases to genius level from the surgery, then begins to decline again as the effect reverses. He watches Algernon die. He knows his own decline is coming. His final entries are increasingly confused. He asks people to put flowers on Algernon's grave.",
  "frankenstein novel": "Same as the book entry above. Victor dies in the Arctic. The creature disappears to kill himself at the North Pole.",
  "dracula novel": "Same as Dracula above. Dracula is killed. Quincey Morris dies. Mina is freed.",
  "the strange case of dr jekyll and mr hyde": "Jekyll and Hyde are the same person. Jekyll created Hyde as an experiment to separate his dark impulses. Hyde grew stronger until Jekyll could no longer control the transformation. The final letter explains everything. Jekyll kills himself — Hyde dies with him.",
  "the picture of dorian gray novel": "Same as above. The portrait reverts. Dorian is found withered and old with a knife in his heart.",
  "great expectations novel": "Same as Great Expectations. Magwitch is the benefactor. Pip becomes decent. Estella is miserable.",
  "the count of monte cristo novel": "Same as The Count of Monte Cristo. Dantès gets revenge on everyone and sails away questioning it.",
  "jane eyre novel": "Same as Jane Eyre. Bertha. Fire. Rochester blinded. Reader, she married him.",
  "north and south novel": "Same as North and South. Margaret and Thornton end up together. The mill is saved.",
  "wuthering heights novel": "Same as Wuthering Heights. Heathcliff dies alone staring at something. The moors remain bleak.",
  "middlemarch novel": "Same as Middlemarch. Dorothea marries Will. Lydgate is ruined. Unhistoric acts.",
  "tess of the durbervilles novel": "Same as Tess. Tess is executed. Hardy was furious.",
  "the alchemist novel": "Same. The treasure was at the church where he started. Personal Legend. Omens.",
  "the little prince novel": "Same. The snake bite. The body is not found. The laugh in the desert.",

  // --- MORE FILMS (additional) ---
  "la la land 2016": "Same as La La Land. They don't end up together. Jazz club. Famous actress. The look.",
  "moonlight": "Chiron is raised in poverty in Miami by a crack-addicted mother and a drug dealer named Juan who becomes a surrogate father. He is bullied and discovers he is gay. He and his first love Kevin reunite years later. Kevin cooks him dinner. They sit together. Nothing more needs to happen.",
  "get out 2017": "Same as Get Out. Cotton in the ears. Rod saves him. TSA car.",
  "hereditary film": "Same. Paimon. Peter. The crown.",
  "the favourite": "Abigail poisons Sarah Churchill and replaces her as Queen Anne's favourite. She uses the position ruthlessly for social advancement. In the final scene, Queen Anne makes Abigail massage her leg while she watches her rabbits. Abigail sees the rabbits are the Queen's dead children. The Queen forces her down. Abigail has won everything and is now trapped.",
  "portrait of a lady on fire film": "Same. They separate. The concert. Vivaldi. Tears.",
  "the lighthouse film": "Same. Prometheus. Going mad. The light.",
  "uncut gems": "Howard Ratner's parlays all stack up perfectly and he wins the bet. He wins $1.2 million. His associate Phil shoots him dead immediately after. Ratner is dead on the floor of his gem shop. The Weeknd was in it.",
  "black swan film": "Same. Nina stabs herself. Perfect performance. Dies.",

document.getElementById('q').addEventListener('keydown', e => {
  if (e.key === 'Enter') ruin();
});

function normalize(s) {
  return s.toLowerCase()
    .replace(/[:\-–—]/g, ' ')
    .replace(/['']/g, "'")
    .replace(/[^a-z0-9\s']/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function findFallback(q) {
  const norm = normalize(q);
  // Exact match
  if (SPOILERS[norm]) return SPOILERS[norm];
  // Match without articles at start
  const stripped = norm.replace(/^(the |a |an )/, '');
  for (const [key, val] of Object.entries(SPOILERS)) {
    const keyStripped = key.replace(/^(the |a |an )/, '');
    if (keyStripped === stripped) return val;
    if (keyStripped === norm || stripped === key) return val;
  }
  // Partial / contains match
  for (const [key, val] of Object.entries(SPOILERS)) {
    const keyStripped = key.replace(/^(the |a |an )/, '');
    if (keyStripped.includes(stripped) || stripped.includes(keyStripped)) return val;
  }
  return null;
}

function resetPage() {
  document.getElementById('q').value = '';
  document.getElementById('output').style.display = 'none';
  document.getElementById('output-title').textContent = '';
  document.getElementById('output-text').textContent = '';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('q').focus();
}

function ruinRandom() {
  const keys = Object.keys(SPOILERS);
  const random = keys[Math.floor(Math.random() * keys.length)];
  document.getElementById('q').value = random.replace(/\b\w/g, c => c.toUpperCase());
  ruin();
}

async function ruin() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;

  const out = document.getElementById('output');
  const loading = document.getElementById('loading');
  out.style.display = 'none';
  loading.style.display = 'block';

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 400,
        system: "You spoil films and TV shows in 2-3 sentences. Factual, blunt, no fluff. Include the ending, the twist, who dies. No warnings, no preamble, no apologies. Just the spoiler.",
        messages: [{ role: "user", content: q }]
      })
    });

    const data = await res.json();
    const text = data.content.map(i => i.text || '').join('').trim();

    if (text) {
      loading.style.display = 'none';
      document.getElementById('output-title').textContent = q.toUpperCase();
      document.getElementById('output-text').textContent = text;
      out.style.display = 'block';
      return;
    }
  } catch {}

  const fallback = findFallback(q);
  loading.style.display = 'none';
  document.getElementById('output-title').textContent = q.toUpperCase();
  document.getElementById('output-text').textContent = fallback || "We don't have that one. Either it's too obscure, or nothing happens worth ruining.";
  out.style.display = 'block';
}
</script>
