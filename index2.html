  // TV SHOWS
  "breaking bad": "Walt dies on the floor of a meth lab. He saves Jesse, poisons Lydia, kills the Nazis, and admits to Skyler he did it all for himself. Jesse screams and drives away.",
  "planet earth ii": "David Attenborough watches animals survive incredible odds. The marine iguanas vs snakes on Fernandina Island is genuinely one of the most tense things ever filmed.",
  "planet earth": "The polar bear episode will hollow you out. The planet is changing. Attenborough is filming faster than it's disappearing.",
  "band of brothers": "Easy Company survives the war. Winters ends up a farmer in Pennsylvania. The men are real. The text at the end confirms who became what.",
  "game of thrones": "Bran becomes king. Daenerys burns the city, Jon kills her, Drogon melts the Iron Throne. Ghost gets his belly rub. You waited eight years for the kid pushed from a window in episode one.",
  "chernobyl": "Legasov records cassette tapes telling the truth and mails them before he dies by suicide, one year to the day after the disaster. The sarcophagus cracks.",
  "the wire": "Nobody wins. The drug trade continues. McNulty fakes a serial killer and gets quietly run out. Omar dies shot by a child in a corner store. Wallace. Always Wallace.",
  "true detective": "Tuttle is behind the murders. Cohle and Hart survive, barely. Cohle nearly dies and sees the dark but also the light. He talks about the stars.",
  "the sopranos": "Tony is probably shot in the diner. The screen cuts to black. The onion rings. Meadow parallel parks. Everything goes quiet.",
  "our planet": "Attenborough narrates. The walruses fall off the cliff because there's no sea ice left. It's the most quietly devastating thing on Netflix.",
  "fargo": "Molly catches Lorne Malvo. Lester runs onto a frozen lake and falls through. Molly and Gus have a baby. Lou Solverson turns out to be her dad.",
  "sherlock": "Sherlock faked his death at the end of series 2. He has a secret sister Eurus in series 4 locked in an island prison. The show ends in a way that satisfies very little.",
  "cosmos": "Carl Sagan explains the universe with such love that you momentarily feel okay about being an insignificant speck of carbon on a pale blue dot.",
  "death note": "L dies. Light wins for a while. Near and Mello eventually expose him. Light is shot by Matsuda and bleeds out on a staircase while Ryuk writes his name in the Death Note.",
  "attack on titan": "Eren triggers the Rumbling and kills 80% of the world's population. His friends kill him to stop him. Mikasa decapitates him. Whether he chose this knowing it would unite humanity or was just a genocidal maniac is never fully resolved.",
  "fullmetal alchemist brotherhood": "Edward sacrifices his ability to use alchemy to get his brother's body back. Al gets his body back. Ed and Winry get together. Roy Mustang gets his eyesight back.",
  "the twilight zone": "The last person on earth finally gets to read all the books. He drops his glasses. They shatter. Time enough at last.",
  "succession": "Kendall doesn't get Waystar. Tom does. Tom, who once ate a dog biscuit. Roman smirks through tears. Siobhan puts her hand on Tom's. She doesn't mean it.",
  "oz": "Most people die or end up worse. Beecher survives, barely. Keller dies. Em City is destroyed. The finale involves time travel that nobody fully endorses.",
  "deadwood": "The town is absorbed into South Dakota Territory. Hearst wins. Swearengen survives. Jane and Joanie are finally together. HBO cancelled it. There's a film that partially closes things.",
  "twin peaks": "Laura Palmer was killed by her own father Leland, possessed by BOB. Cooper gets trapped in the Black Lodge. His doppelgänger walks around for years.",
  "twin peaks the return": "Cooper retrieves Laura from the past but it breaks the timeline. He ends up outside a house in the dark with a woman who may be Laura. She suddenly screams. The lights go out.",
  "the x files": "Mulder finds the truth and it gets covered up every time. The mythology was abandoned. The monster-of-the-week episodes hold up better.",
  "the americans": "Philip and Elizabeth flee to Russia. Paige stays behind. Stan finds out too late to stop them. They were his best friends. They were KGB.",
  "atlanta": "The show ends with surreal and unexplained events. The finale involves a beach. It concludes on its own terms, which is the only way it could.",
  "barry": "Barry is killed by Janice's son John years in the future. The film he inadvertently created becomes a beloved classic. Sally tells John his father was good. He wasn't entirely.",
  "better call saul": "Jimmy becomes Saul becomes Gene. He gets caught in Omaha, given 86 years reduced to 7 when he confesses the full truth in court. Kim watches from the gallery. He waves at her. She waves back.",
  "the haunting of hill house": "The ghosts are grief. Nell was the Bent-Neck Lady all along — her ghost travelled back through time to appear to her younger self. Hugh seals himself into the house and dies to save his children.",
  "mindhunter": "Holden Ford talks to serial killers to build FBI profiling. BTK appears in the background, living his ordinary life. The show was cancelled before Rader was arrested. He was the cliff it was driving toward.",
  "the leftovers": "The Departure is never explained. Nora claims to have visited a world full of the departed and come back. Kevin asks if it's true. She says yes. He holds her. The mystery remains. That's the point.",
  "fleabag": "The Priest loves Fleabag. They kiss. He chooses God. She chooses to let him. She looks to camera one last time. She walks on.",
  "the crown": "Charles and Diana's marriage collapses. The final season ends with Diana's death and the public grief the Queen struggled to match.",
  "rome": "Caesar is assassinated. Pullo kills Vorenus's enemy and Vorenus dies in his arms. The HBO/BBC budget ran out. Decades got crammed into season 2.",
  "mad men": "Don Draper goes to a Californian retreat, meditates, smiles — and the smile cuts directly to the 'I'd Like to Buy the World a Coke' ad. He invented it out of his spiritual epiphany and went back to work.",
  "the boys": "Homelander is essentially Donald Trump with heat vision. By season 4 he's publicly beaten a man to death at a rally while the crowd cheers.",
  "the handmaid's tale": "June escapes Gilead. Her daughter Hannah is still inside. June dedicates herself to going back. Gilead persists.",
  "arrested development": "The Bluth family never learns. GOB doesn't know how he does the tricks. Buster loses a hand to a loose seal. The banana stand always had money in the walls. Always.",
  "mr robot": "Elliot Alderson is Mr Robot is the Mastermind — a third personality who engineered the 5/9 hack. The real Elliot has been asleep inside his own mind. He wakes up at the end.",
  "house of cards": "Frank Underwood claws his way to the presidency through murder. He's eventually exposed and dies in his sleep — murdered by Claire — between seasons.",
  "the office": "Michael Scott gets the romance he always wanted. Jim and Pam stay together. Dwight becomes Regional Manager. 'That's what she said.'",
  "parks and recreation": "Leslie becomes governor and eventually a federal official. Ron disappears into the woods and is happy. Everyone gets their happy ending.",
  "community": "The study group stays together despite Greendale being objectively terrible. Pierce dies. Troy sails the world. The six seasons and a movie promise is eventually delivered.",
  "seinfeld": "Jerry, George, Elaine and Kramer are sentenced to a year in prison for violating a Good Samaritan law. Every person they ever wronged testifies. They go to jail laughing about a button.",
  "the simpsons": "Homer strangles Bart. The show continues. The early seasons are among the best television ever made. The later seasons are a philosophical question about legacy.",
  "bojack horseman": "Bojack nearly dies in a swimming pool. He survives, gets a reduced prison sentence, and meets Diane one last time on a rooftop. She leaves. He stays. There's nothing neat about it.",
  "the mandalorian": "Din Djarin and Grogu find each other, lose each other, find each other again. Bo-Katan reclaims Mandalore. Grogu chooses Mando over Jedi training with Luke Skywalker.",
  "stranger things": "Eleven defeats Vecna — who is Henry Creel, the original test subject. Max is in a coma and blind. The Upside Down cracks open Hawkins.",
  "the last of us": "Joel lies to Ellie. He kills the doctors who would have used her brain to make a vaccine. She eventually finds out. She doesn't forgive him before he dies. He dies at the hands of Abby.",
  "dark": "The apocalypse and all time loops can be ended by going back to 1953. Jonas and Martha travel back and choose to stop existing. The knot is broken. They fade. Jonas says 'It's beautiful.'",
  "peaky blinders": "Tommy Shelby has been told he's dying of tuberculoma. He burns everything and turns the gun on himself. It clicks and doesn't fire. He was conned. He walks toward the horizon. He's alive.",
  "severance": "The innies escape briefly by possessing their outies during a wellness session. Mark's wife is alive — she's a test subject at Lumon. Helly is Helena Eagan, the founder's daughter. Nothing is resolved.",
  "the bear": "The Beef becomes The Bear. Carmy gets a Michelin star. Carmy loses the woman he loves by locking himself in a walk-in freezer emotionally and literally. Richie's transformation is the best arc.",
  "andor": "Cassian becomes the Rebel who dies in Rogue One getting the Death Star plans. Luthen Rael has sacrificed every principle he had for the rebellion and can never return to the light.",
  "shogun": "Blackthorne's ship is burned — probably by Buddhist monks to give Toranaga an excuse to keep him. Toranaga becomes Shogun. Mariko dies. Blackthorne will never go home.",
  "the terror": "The Franklin Expedition starves and freezes. Crozier survives by living with the Inuit. The men die by lead poisoning from their own tinned food supply.",
  "bluey": "Bluey and Bingo play. The dog family is happy and loving and flawed and real. The Sleepytime episode is an unexpected piece of art. Everything is fine. Everything is fine.",
  "over the garden wall": "The Beast harvests lost souls to fuel his lantern. Greg almost becomes a tree. Both boys wake up having nearly drowned on Halloween. The Unknown was purgatory.",
  "gravity falls": "Bill Cipher possesses Stan's body and opens a rift to the nightmare realm. Stan's memory is erased to close it. Soos becomes the new owner. Stan gets his memories back, piece by piece.",
  "avatar the last airbender": "Aang defeats Fire Lord Ozai using energybending — removing his bending rather than killing him. Zuko becomes Fire Lord. Aang and Katara are together. The war ends.",
  "firefly": "The show is cancelled after 14 episodes. Serenity the film kills Wash with a harpoon. Book dies. The Alliance's secret is broadcast. There will never be a season 2.",
  "house md": "House fakes his death to spend the last months of Wilson's life with him. He lets everyone think he's dead. He was always capable of this kind of love — just only when there was no future to protect.",
  "monk": "Monk solves the murder of his wife Trudy. He gets closure, takes a case, and keeps going. He was the saddest man on television and the best detective.",
  "the shield": "Vic Mackey confesses everything to get immunity. Everything. Every murder. Ronnie is arrested as Vic watches through the window, doing nothing. Shane kills his wife, son and himself in a motel room.",
  "justified": "Raylan and Boyd have their final confrontation. Boyd goes to prison and reaches a kind of peace. Raylan finds Ava four years later in California with a child. He has the decency to leave her alone.",
  "hannibal": "Will and Hannibal go over a cliff together. They survive, or they don't — NBC cancelled the show before confirmation. Bedelia's severed leg is on a dinner plate and she's eating it.",
  "black sails": "Flint is exiled to Thomas Hamilton's care — Silver betrays him to end the war. Silver never tells Madi the truth. Billy Bones goes to the island that will become Treasure Island.",
  "true blood": "Bill chooses to die. He asks Sookie to use her last fairy light to kill him so she can be fully human. She doesn't. She stakes him in the ground of his own grave. She moves on. She marries a normal man.",
  "the last kingdom": "Uhtred finally takes Bebbanburg after a lifetime of trying. He fulfils his destiny and walks into the sea at the end. It's not death. It's completion.",
  "succession season 4": "Tom wins. Kendall loses. Roman smirks through tears. Logan wins from beyond the grave.",
  "house of the dragon": "Lucerys Velaryon is killed by Aemond Targaryen riding Vhagar. This kicks off the Dance of the Dragons — a Targaryen civil war. Both sides lose everything. The dragons go extinct.",
  "the last of us season 2": "Abby kills Joel in front of Ellie. Ellie spends the season hunting Abby. She catches her, nearly kills her, then lets her go. She loses two fingers to a bite. She can no longer play guitar.",
  "andor season 1": "Cassian becomes a Rebel. Luthen sacrifices everything. Maarva's funeral speech is the finest speech in Star Wars.",
  "only murders in the building": "The killer is always someone the trio never fully suspected. Charles, Oliver and Mabel solve the murder. There is always another murder. That's the premise.",
  "wednesday": "The monster killing outcasts is connected to a family curse tied to Wednesday's ancestor Goody Addams. The villain is a teacher. Wednesday almost learns to trust people. She remains Wednesday.",
  "squid game": "Player 456 — Gi-hun — wins the game. He discovers the old man was the organiser. His friend Sang-woo dies by suicide at the final round. Gi-hun is left alone with money and nobody. He boards a plane to continue the fight in season 2.",
  "squid game season 2": "Gi-hun enters the game again from the inside to destroy it. He recruits players. Most of his allies die. The game continues into season 3.",
  "the witcher": "Geralt finds Ciri and they become family. The Continent is at war. Yennefer and Geralt have an on-again-off-again relationship for multiple seasons. Henry Cavill left the show after season 3.",
  "loki": "Loki ends up as the one entity holding all timelines together at the end of time, sacrificing himself in an eternal loop so the multiverse doesn't collapse. He becomes a god. He's alone.",
  "wandavision": "Wanda Maximoff was unknowingly trapping a New Jersey town in a sitcom reality to process her grief over Vision. She releases it. Vision is destroyed again. Agatha is trapped in a suburban hell of her own. Wanda goes to study the Darkhold alone.",
  "what we do in the shadows tv": "The vampire flatmates remain idiots. The energy vampire Colin is the most dangerous of all. Nandor leaves to find love. The show is a gentle and beloved sitcom about undead idiots in Staten Island.",
  "the white lotus": "Someone dies every season. The rich are terrible. The staff endure. Season 1: Armond dies. Season 2: Tanya dies. Her husband Gregory had her killed. Season 3 continues the pattern.",
  "euphoria": "Rue relapses, nearly dies, gets clean again. Jules and Rue are not okay. Nate is not okay. Cassie is not okay. Fezco does not show up to prom because his little brother accidentally shot someone. The show was partially abandoned mid-production.",
  "yellowstone": "John Dutton is killed in the season 5 premiere — shot by a political opponent. Jamie is behind it, manipulated by his biological father. Beth destroys everything. Rip tries to hold it together.",
  "the outlander": "Jamie and Claire survive centuries of separation and reunion. He doesn't die at Culloden. She comes back through the stones. They live their life, sort of, across time.",
  "outlander": "Jamie survives Culloden. Claire returns through the stones. They raise their family in colonial America. The saga spans decades and several continents.",
  "downton abbey": "Matthew Crawley dies in a car accident after Lady Mary gives birth to their son. The show goes on. Mary eventually remarries. Carson has an essential tremor. The estate survives.",
  "bandstand": "Not a spoiler-worthy premise.",
  "peaky blinders season 6": "Same as Peaky Blinders. Tommy is alive. The gun clicked. He walks toward the horizon.",
  "barry season 4": "Barry is killed in the finale by Janice's son, grown up. The film Barry and Hank made becomes a Hollywood classic. Sally raises the boy on lies about his father.",
  "the white lotus season 2": "Tanya dies. She kills several men on a yacht trying to escape her husband's murder plot and falls overboard. 'These gays, they're trying to murder me.' Then they do.",
  "the walking dead": "Rick disappears in an explosion in season 9 and is presumed dead for years — he's been taken by a helicopter organisation. Hershel is decapitated by the Governor. The Governor destroys the prison. Glenn gets his skull caved in by Negan with a barbed-wire bat called Lucille. Carl dies from a walker bite. Negan eventually becomes one of the good guys, roughly. The show ends after 11 seasons with a timeskip and optimism that felt unearned.",
  "lost": "They were not dead the whole time — that's a persistent myth. The island was real. The flash-sideways in season 6 was purgatory. They all meet in a church at the end and move on together. The polar bear is never fully explained. The numbers mean nothing. Hurley becomes the island's protector.",
  "prison break": "Michael Scofield breaks his brother out of prison — then spends four more seasons breaking into and out of various other facilities. Michael fakes his death, is revealed to be alive, then actually dies for real. Lincoln survives. The company is dismantled. Sara moves on. The revival season brought Michael back yet again.",
  "dexter": "Dexter fakes his death in a hurricane, drives his boat into the storm with Deb's body, and reappears living as a lumberjack in Oregon. Deb dies from a complication after being shot. The finale is widely considered one of the worst in television history. A revival series, New Blood, ends with Dexter being shot dead by his own son.",
  "dexter new blood": "Dexter's son Harrison shoots him dead after discovering who and what he is. Dexter dies in the snow. Harrison drives away. It's a better ending than the original finale.",
  "24": "Jack Bauer saves the country repeatedly and loses everyone he loves in the process. Teri is killed at the end of season 1. David Palmer is assassinated. Jack ends season 8 as a fugitive. In the revival Live Another Day, Audrey is shot dead and Jack surrenders himself to the Russians to save Chloe.",
  "homeland": "Brody is executed in Iran in season 3. Carrie, pregnant with his child, gives the baby up and continues working for the CIA. By the series finale she's living in Moscow as a Russian asset/double agent, having exposed the CIA director's crimes. Saul is imprisoned then released.",
  "house of cards uk": "Francis Urquhart becomes Prime Minister through murder and manipulation, and is eventually shot dead by a journalist's widower on the steps of Downing Street. The original is three parts and far leaner than the American remake.",
  "rome": "Caesar is assassinated. Pullo kills Vorenus's enemy and Vorenus dies in his arms outside Rome. Mark Antony dies in Cleopatra's arms. Octavian becomes Augustus. The budget ran out. The republic is over.",
  "six feet under": "The finale shows the death of every surviving character in a flash-forward montage. Ruth dies in old age. Federico in a car crash. Brenda in a hospital. David and Keith die together. Claire's death closes the series — she's very old, having lived a full life, in a car driving toward her future. It remains one of the greatest finales in television.",
  "the wire season 1": "D'Angelo Barksdale is the conscience of the Barksdale organisation and dies for it — strangled in prison in season 2, staged as a suicide. The investigation yields results but the drug trade absorbs them. The detail is broken up.",
  "boardwalk empire": "Nucky Thompson is shot dead by Tommy Darmody — the son of Jimmy Darmody, who Nucky had killed in season 2. Tommy grew up specifically to avenge his father. The show spans the entire Prohibition era and ends in 1931.",
  "band of brothers hbo": "Easy Company survives the war. Winters ends up a farmer. Speirs was genuinely as fearless as the legend. The men are real and the end cards confirm what became of all of them.",
  "the pacific": "The war ends. Sledge comes home hollowed out. Leckie comes home and finds the girl from the letters. Basilone dies on Iwo Jima. It's darker and less cohesive than Band of Brothers and more honest about what the Pacific theatre actually was.",
  "generation kill": "The Marines take Iraq in three weeks and then have absolutely nothing to do. No WMDs. No clear mission. Nate Fick goes home and writes a book. Evan Wright's article becomes the series. America blinks.",
  "the night of": "Naz Khan is acquitted because the jury is deadlocked — not because he's proven innocent. Whether he actually killed Andrea is never resolved. Box finds the real killer too late to matter legally. Naz is permanently changed by Rikers Island.",
  "sharp objects": "Adora has been poisoning her daughters for years — Munchausen by proxy. She poisoned Marian to death. She was poisoning Amma. Amma killed the local girls and made a floor from their teeth for her dollhouse. Camille discovers this in the final shot of the post-credits scene.",
  "big little lies": "Perry Wright is the rapist who assaulted Jane years ago. He's also been abusing Celeste throughout their marriage. At the end of the party he falls — or is pushed — down the stairs to his death. All five women cover for each other. The police investigation is the framing device.",
  "mare of easttown": "Mare's own son Ryan killed Erin McMenamin, accidentally, trying to scare Billy Ross — whom Ryan believed was Erin's rapist and the father of her baby. The actual father of Erin's baby was John Ross, Ryan's father, who had been having an affair with Erin. Mare's instinct to protect family nearly made her cover the wrong thing.",
  "miniseries chernobyl": "Same as Chernobyl. Legasov's tapes. The sarcophagus cracks. The liquidators die slowly.",
  "black mirror white christmas": "Jon Hamm's character is 'blocked' in real life — meaning he appears as a blurred, silent figure to his ex-partner forever. He's also been convicted and had his digital copy left running in a snow globe for millions of subjective years. It's one of the bleakest hours of television.",
  "years and years": "The Lyons family survives a decade of near-future political collapse, pandemic, and digital body modification. Muriel — the grandmother — delivers the final monologue: all of this happened because ordinary people let it. Then they started paying attention. It ends with cautious hope.",
  "the terror season 1": "Same as The Terror. The Franklin Expedition starves and freezes. Crozier lives by going native. The men die by lead poisoning from their own tinned food.",
  "wolf hall": "Anne Boleyn is executed. Cromwell survives — for now. The sequel Wolf Hall: The Mirror and the Light covers Cromwell's own fall and execution. He served a king who destroyed everyone around him and eventually came for him too.",
  "daredevil": "Fisk is imprisoned at the end of season 1, released and more powerful by season 2, and runs New York from inside the system by season 3. Matt Murdock fakes his death. Elektra dies twice. Stick dies. The show is cancelled by Netflix and later revived on Disney+.",
  "the punisher": "Frank Castle kills everyone who was responsible for his family's deaths. Then kills more people. The show is very violent and was cancelled by Netflix. Frank continues to exist in the Marvel universe.",
  "jessica jones": "Kilgrave — who has been mind-controlling Jessica and others, including making her kill someone — is snapped to death by Jessica when she grabs his head. She's the only person immune to his control. She's been immune the whole time.",
  "ozark": "Marty and Wendy Byrde survive. Ruth is shot dead by Camila Elizondo in revenge for killing her son. The Byrdes walk away clean — no consequences, no justice. The final shot is Wendy and Marty driving, unscathed, into their future. It's meant to be disturbing.",
  "yellowjackets": "The Yellowjackets survivors were cannibals in the wilderness in 1996. In the present timeline they're covering it up. Shauna killed Jackie. The antler queen identity shifts between characters. The supernatural element may or may not be real.",
  // ============ TOP 100 PLAYS ============
  "hamlet": "Nearly everyone dies. Polonius is stabbed by mistake behind a curtain. Ophelia drowns. Laertes and Hamlet poison each other with a envenomed sword in the duel. Gertrude drinks the poisoned wine meant for Hamlet. Hamlet finally kills Claudius. Horatio survives to tell the story. 'The rest is silence.'",
  "macbeth": "Macbeth kills everyone to stay king and is eventually killed by Macduff, who was born by caesarean section and therefore not 'of woman born.' Lady Macbeth goes mad sleepwalking and kills herself. 'Out, damned spot.' The witches were right about everything.",
  "king lear": "Cordelia is hanged. Lear carries her body on and dies of grief. Edmund is killed by Edgar in a duel. Goneril poisons Regan and stabs herself. Gloucester's eyes are gouged out onstage. Everyone dies except Edgar and Albany. It is Shakespeare's most brutal play and possibly his greatest.",
  "othello": "Iago manipulates Othello into believing Desdemona is unfaithful using a handkerchief. Othello smothers Desdemona to death. Emilia reveals the truth. Iago kills Emilia. Othello kills himself over Desdemona's body. Iago is led away for torture and says he will never speak again.",
  "romeo and juliet": "They both die. Romeo kills himself because he thinks Juliet is dead, seconds before she wakes up from the sleeping potion. Juliet kills herself when she sees Romeo dead. Mercutio and Tybalt die in the middle. The families reconcile over the corpses. It takes about five days.",
  "a midsummer night's dream": "Everything is sorted by the end. The lovers pair up correctly thanks to fairy magic. Bottom doesn't remember being turned into a donkey or sleeping with the fairy queen. Oberon and Titanic reconcile. Puck apologises to the audience. Everyone marries.",
  "the tempest": "Prospero forgives his enemies rather than destroying them. He releases Ariel, frees Caliban, and drowns his magic books. Miranda and Ferdinand marry. Prospero returns to Milan as Duke. It is widely read as Shakespeare's farewell to the stage.",
  "a midsummer nights dream": "Same as A Midsummer Night's Dream. Puck did it. Everyone marries.",
  "twelfth night": "Viola — disguised as a man — is loved by Olivia, who she's courting on behalf of Orsino, who she loves. Her twin Sebastian arrives, Olivia marries him by mistake, and everything resolves when Viola's identity is revealed. Malvolio is humiliated throughout and storms off vowing revenge. Sir Toby and Maria marry.",
  "much ado about nothing": "Beatrice and Benedick admit they love each other after both being tricked into believing the other is lovesick. Hero is falsely accused of infidelity by Don John, fakes her death, and is vindicated. Claudio agrees to marry a veiled woman who turns out to be Hero. Don John is arrested. Everyone dances.",
  "the merchant of venice": "Shylock loses his case when Portia points out the bond says a pound of flesh but says nothing about blood — he can't take the flesh without spilling it. He's stripped of his money and forced to convert to Christianity. Antonio's ships return. The lovers are reunited. Shylock exits and is never mentioned again.",
  "richard iii": "Richard murders his way to the throne — including the Princes in the Tower, his brother Clarence, and his wife Anne. He's haunted by all their ghosts the night before Bosworth Field. Richmond kills him in battle. 'A horse! A horse! My kingdom for a horse!'",
  "julius caesar": "Caesar is stabbed 23 times on the Ides of March by the conspirators including Brutus. Mark Antony's funeral speech turns the crowd against the conspirators. Brutus and Cassius both die at Philippi — Cassius by his own sword, Brutus by running on his own sword. 'Et tu, Brute?'",
  "antony and cleopatra": "Antony falls on his sword after hearing Cleopatra is dead — she isn't. He dies in her arms. Cleopatra allows an asp to bite her rather than be paraded through Rome as a captive. Octavius finds her dead, posed as a queen. He's genuinely moved. He buries them together.",
  "the winter's tale": "Leontes accuses his wife Hermione of adultery out of jealousy, their son Mamillius dies of grief, their baby daughter is abandoned on the coast of Bohemia, and Hermione apparently dies. Sixteen years later, the daughter (Perdita) is found and Hermione is revealed as a statue that comes to life. Leontes is forgiven. It's a problem play.",
  "measure for measure": "Angelo tries to coerce Isabella into sleeping with him in exchange for her brother's life. The Duke — disguised as a friar — engineers a bed trick using Angelo's abandoned fiancée Mariana instead. Angelo is exposed. Claudio lives. The Duke proposes to Isabella. She says nothing. Her silence is everything.",
  "the taming of the shrew": "Petruchio breaks Katherine's spirit through psychological torment and sleep deprivation until she delivers a speech about wifely submission. Whether this is satire, irony or genuine misogyny is a debate that will never end. Bianca's subplot involves multiple suitors in disguise.",
  "waiting for godot": "Godot never comes. Vladimir and Estragon wait by a tree, argue, consider leaving, don't. Pozzo goes blind. Lucky goes mute. A boy arrives to say Godot won't come today but will tomorrow. They decide to leave. They don't move. The play ends. Beckett said he didn't know who Godot was.",
  "endgame": "Hamm is blind and can't stand. Clov can't sit. Nagg and Nell live in dustbins — Nell may be dead. The world outside is apparently dead. Clov threatens to leave throughout. At the end he appears dressed to go. He doesn't go. Or does he. Beckett isn't clarifying.",
  "krapp's last tape": "Krapp, an old man, listens to tapes he made of himself decades ago and records a new one. The younger Krapp was passionate, ambitious, and in love. The old Krapp is alone and contemptible. He rewinds and listens to the love passage again and again. He records nothing worth keeping.",
  "happy days": "Winnie is buried to her waist in a mound of earth in Act 1, and to her neck in Act 2. Her husband Willie crawls around occasionally. She talks cheerfully about the happy day, applying lipstick, brushing teeth, reciting fragments of poetry. The sun blazes. She cannot move. She keeps talking.",
  "a streetcar named desire": "Blanche DuBois is raped by Stanley Kowalski while Stella is in hospital having their baby. Stella chooses not to believe Blanche's account and has her committed to a psychiatric institution. Blanche is led away. 'I have always depended on the kindness of strangers.' Stanley comforts Stella.",
  "death of a salesman": "Willy Loman kills himself in a car crash — staged as an accident — so Biff can collect the life insurance and start a business. Biff doesn't want the money. At the funeral, almost no one comes. Linda says they're free and clear now. 'Attention must be paid.'",
  "the glass menagerie": "Tom abandons his mother Amanda and his fragile sister Laura to escape the suffocating apartment. He spends years afterwards haunted by the image of Laura and her glass unicorn. The play is his guilty memory. He begs her to blow out her candle. She does. He is never free of her.",
  "a view from the bridge": "Eddie Carbone reports his wife's cousins — illegal immigrants from Italy — to the immigration authorities out of his suppressed desire for his niece Catherine. He is killed by Marco, whose brother Rodolpho Catherine is marrying. Eddie dies insisting on his name. Alfieri narrates.",
  "all my sons": "Joe Keller knowingly shipped cracked cylinder heads during WWII that caused planes to crash, killing pilots. One of the dead pilots was his own son Larry — who shot himself rather than return home after discovering the truth. Joe reads the letter and shoots himself.",
  "the crucible": "John Proctor confesses to witchcraft, then tears up the signed confession rather than have his name displayed. He goes to the gallows. Abigail Williams — who started everything — flees to the West Indies. The trials continue. Arthur Miller wrote it about McCarthyism. Nobody missed the point.",
  "long days journey into night": "The Tyrone family destroys itself over one day. James Sr's miserliness, Jamie's alcoholism, Edmund's tuberculosis, Mary's morphine addiction — all exposed, all old wounds reopened. Mary comes downstairs with her wedding dress, lost in memory. 'None of us can help the things life has done to us.'",
  "who's afraid of virginia woolf": "George and Martha's son — used as a weapon against each other all night — is revealed to be a fiction they invented to cope with their childlessness. George kills him by announcing his 'death' as a kind of exorcism. Martha is devastated. They are left alone with each other and nothing else.",
  "the importance of being earnest": "Both Algernon and Jack have been pretending to be called Ernest. Jack is revealed to actually be named Ernest — he was an abandoned baby found in a handbag at Victoria Station by Miss Prism. His father was General Moncrieff, making him Algernon's brother. Lady Bracknell accepts everything. Everyone marries.",
  "an ideal husband": "Sir Robert Chiltern's political career is built on a youthful crime — selling a Cabinet secret. Mrs Cheveley blackmails him with a letter. Lord Goring outmanoeuvres her using a stolen brooch. The letter is destroyed. Sir Robert's wife forgives him. He is appointed to the Cabinet anyway. Wilde's most political play.",
  "lady windermere's fan": "Mrs Erlynne is Lady Windermere's mother — abandoned as a child. She sacrifices her own reputation to save her daughter from eloping with Lord Darlington, taking the blame for being found in his rooms. Lady Windermere never learns the truth. Mrs Erlynne leaves England. 'We are all in the gutter, but some of us are looking at the stars.'",
  "salome": "Salome demands the head of John the Baptist on a silver platter as her reward for the Dance of the Seven Veils. She gets it. She kisses the severed head on the lips. Herod, disgusted and frightened, orders his soldiers to kill her. They crush her under their shields.",
  "three sisters": "The three sisters never get to Moscow. They talk about going to Moscow for three acts. Vershinin leaves with the regiment. Tuzenbach is killed in a pointless duel. Andrei is trapped by his wife Natasha, who has taken over the house. They face the future with nothing resolved and somehow keep going.",
  "the cherry orchard": "The cherry orchard is sold at auction to Lopakhin — the son of a former serf — because the family can't pay their debts and won't act. They leave. The axes start before the family is even out of the house. Firs — the ancient servant — is accidentally locked inside and left behind. He lies down and is still.",
  "uncle vanya": "Nothing happens and nothing changes. Vanya tries to shoot Serebryakov and misses twice, at close range. Astrov leaves. Sonya and Vanya return to the estate books. Sonya's final speech — 'we shall rest' — is one of the most quietly devastating passages in theatre. Chekhov considered it a comedy.",
  "the seagull": "Treplev shoots himself — offstage, at the end. Nina chose Trigorin over him, Trigorin left her, their baby died, and she's become a minor provincial actress. Arkadina doesn't know her son is dead yet. Dorn tells Trigorin quietly. The card game continues.",
  "ivanov": "Ivanov is exhausted, in debt, his wife is dying, and he's falling for a younger woman. At his engagement to Sasha, his dying wife arrives and denounces him. He goes offstage and shoots himself. Chekhov's first major play. He said he didn't know what it was about either.",
  "the visit": "The richest woman in the world, Clara Zachanassian, returns to her impoverished hometown and offers a billion to have her former lover Alfred Ill killed — he got her pregnant and bribed witnesses against her when she was young. The town, which initially refuses, gradually acquires credit against the money. Ill is killed. The town takes the money.",
  "mother courage and her children": "Mother Courage follows the Thirty Years' War selling supplies and loses all three of her children to it — one shot, one executed, one killed in battle. After each death she returns to pulling her wagon. At the end she's alone, pulling the wagon herself, following the army. She has learned nothing. That's the point.",
  "the good person of szechwan": "The gods find only one good person — Shen Te — and she can only maintain her goodness by inventing a ruthless male cousin, Shui Ta, to protect herself. Shui Ta runs a successful factory. Shen Te is revealed to be Shui Ta at trial. The gods ascend on a pink cloud and don't help. Brecht has questions.",
  "the caucasian chalk circle": "The child is placed in a chalk circle and told to pull it toward them by both the biological mother and Grusha, the servant who raised him through war and hardship. Grusha refuses to pull, not wanting to hurt the child. The judge awards her the child. The biological mother had abandoned him fleeing the revolution.",
  "life of galileo": "Galileo recants his findings under threat of torture. His student Andrea is disgusted. Years later, Andrea learns Galileo continued his work secretly and has smuggled his Discorsi out of Italy. Whether the recantation was cowardice or cunning survival is Brecht's deliberately unanswered question.",
  "the threepenny opera": "Macheath — Mack the Knife — is arrested, condemned to hang, and in the final scene is saved by a royal pardon riding in on a horse. Brecht intended this as a deliberate deus ex machina to show the audience how unsatisfying it is when crime goes unpunished by anything except plot convenience.",
  "the caucasian chalk circle brecht": "Same as The Caucasian Chalk Circle. Grusha wins the child. The judge is Azdak, a rogue.",
  "rhinoceros": "One by one, the townspeople transform into rhinoceroses — conforming to the herd. Berenger is the last human left. His girlfriend Daisy transforms too. He considers it but can't. He is alone, human, surrounded by rhinoceroses. Whether this is victory or tragedy is Ionesco's question.",
  "the bald soprano": "The Smiths and the Martins have a circular, nonsensical conversation in which language gradually ceases to mean anything. The play ends with the Martins replacing the Smiths and starting the play again from the beginning. It has been running in Paris since 1957.",
  "the chairs": "An old couple set up chairs for an invisible audience who are coming to hear a message the Old Man has for humanity. An Orator arrives. The couple throw themselves out of the window. The Orator is mute. He writes gibberish on the blackboard. The chairs are full of no one.",
  "six characters in search of an author": "Six characters interrupt a rehearsal demanding their story be staged. The Father and Stepdaughter's story involves a brothel and near-incest. In the performance, the Boy shoots himself and the Little Girl drowns. Whether these are real deaths or theatrical ones is the play's central crisis. Pirandello considers reality and illusion the same problem.",
  "henry iv pirandello": "The man known as Henry IV fell from a horse during a pageant and became convinced he was the Holy Roman Emperor Henry IV. He has been maintaining this fiction for years — surrounded by paid attendants — though it's implied he recovered his sanity long ago and simply chose to remain 'mad.' He kills a man at the end and has no choice but to stay in character forever.",
  "the master builder": "Halvard Solness, the ageing master builder, has suppressed younger rivals and been haunted by guilt over a fire that killed his sons. Young Hilde arrives and challenges him to climb the tower of his new house — something he's been afraid to do for years. He climbs it. He falls. She waves her shawl.",
  "hedda gabler": "Hedda burns Lovborg's manuscript — 'the child' he created with Thea. She gives Lovborg a pistol and tells him to die beautifully. He shoots himself accidentally in the stomach — not beautifully. Judge Brack knows it was her pistol and threatens to blackmail her. She goes into the back room and shoots herself in the head. Brack says 'people don't do such things.'",
  "a dolls house": "Nora leaves. She walks out on her husband and children because she realises she has been treated like a doll — first by her father, then by Torvald — and has never been allowed to think for herself. The door slams. In 1879 this was revolutionary. It still is.",
  "ghosts ibsen": "Mrs Alving discovers her son Oswald has inherited syphilis from his dissolute father — whose memory she has spent years preserving. Oswald asks her to give him morphine when his mind goes. He has a breakdown. She stands with the pills. The curtain falls. Ibsen doesn't say what she does.",
  "the wild duck": "Gregers Werle — a fanatical truth-teller — reveals to Hjalmar Ekdal that his daughter Hedvig is not his biological child. Hjalmar rejects Hedvig. To prove her love, Hedvig shoots herself with the pistol that was meant for the wild duck. Gregers's idealism has killed her. Relling says 'The life-lie is the saving grace of most people.'",
  "peer gynt": "Peer Gynt spends his life fleeing responsibility and selfhood — adventuring, lying, becoming a slave trader, a false prophet, an emperor of the trolls. In old age he returns to Solveig, who has waited for him, and discovers she has preserved his true self through her faithfulness. He is reborn in her lap. It is four hours long.",
  "miss julie": "Miss Julie and her father's valet Jean have sex on Midsummer night. Her class is destroyed. She cannot go back. Jean suggests she kill herself and puts a razor in her hand. She goes out in a trance. Strindberg did not like women.",
  "the father strindberg": "The Captain is driven mad by his wife Laura, who systematically undermines his authority, questions the paternity of his daughter, and has him declared insane. He is put in a straitjacket. He dies of a stroke. Strindberg wrote it in a fury. His wife thought he was describing her.",
  "look back in anger": "Jimmy Porter shouts at everyone, especially his wife Alison, for the entire play. She has a miscarriage and comes back. They play their squirrels-and-bears game at the end to survive their marriage. Nothing changes. John Osborne invented the Angry Young Man and then embodied him until he died.",
  "the entertainer": "Archie Rice is a failing music hall comedian whose world is ending — culturally, personally, financially. His son is killed in Suez. His father — a great old-time performer — dies backstage. Archie tells a joke nobody laughs at and the lights go out. Olivier played him as the death rattle of England.",
  "betrayal": "Harold Pinter tells the story of an affair between Jerry and Emma backwards. You watch the relationship unravel in reverse — each scene is the past of the previous one. By the end you're at the beginning, watching them start something you already know destroys everyone.",
  "the birthday party": "Stanley is visited by two men — Goldberg and McCann — who interrogate him through a disturbing birthday party game until he breaks down. The next morning he is docile, dressed in a suit, and led away by them. Nobody explains who they are or what they wanted. The landlady Meg doesn't notice.",
  "the caretaker": "Aston offers Davies — a tramp — a place to stay. Davies plays Aston and his brother Mick against each other, making small power grabs. Mick throws him out. Aston lets him stay on his own terms. Davies pleads. Aston says nothing. The silence is the answer.",
  "the homecoming": "Teddy brings his American wife Ruth home to meet his family — his father, two brothers, and uncle. They are crude and possessive. Ruth matches them. By the end she has agreed to stay in London as a prostitute for the family while Teddy returns to America alone. She chose it.",
  "arcadia": "The two timelines — Regency and modern-day — occupy the same stage. Thomasina was burned to death the night before her seventeenth birthday, probably in a fire. Septimus spent the rest of his life alone in the hermitage working on her theorem. The modern characters piece together the past without ever quite getting it right. At the end both timelines dance at the same time.",
  "the real thing": "Henry, a playwright, discovers that real love — unlike the love he writes about — is messy and requires actual vulnerability. His wife Annie has or hasn't had an affair. The play within the play is terrible, which makes the point. Stoppard's most emotionally direct play.",
  "rosencrantz and guildenstern are dead": "Rosencrantz and Guildenstern arrive in England with a letter ordering Hamlet's execution. Hamlet has switched the letter to order their deaths instead. They discover this too late. They die. Hamlet doesn't notice. The Player says death is the only thing you can't be expected to do convincingly on stage.",
  "translations": "A British military survey is anglicising Irish placenames, erasing the Gaelic landscape. Owen translates between worlds. Yolland — an English soldier — falls in love with Máire and disappears, probably killed. The army threatens the town. Nothing is resolved. The language is being taken and cannot be recovered.",
  "dancing at lughnasa": "Five sisters in rural Donegal in 1936. Their brother Jack has returned from Uganda half-mad and animistic. Michael — the narrator — remembers one brief moment when they danced wildly together to the radio. After that: Gerry leaves, Jack dies, Chris never marries, Agnes and Rose disappear to London. 'Dancing as if language had surrendered to movement.'",
  "philadelphia here i come": "Gar O'Donnell is emigrating to Philadelphia. The play splits him into Public Gar and Private Gar — the self he shows and the self he hides. His father cannot say he loves him. Gar cannot ask. Neither one breaks the silence before Gar leaves in the morning. Friel said nothing more needed to happen.",
  "juno and the paycock": "Captain Boyle's promised inheritance is a lawyer's error — it doesn't exist. His son Johnny is killed by the IRA for informing on a comrade. His daughter Mary is pregnant and abandoned by the man who seduced her. Juno leaves with Mary. Boyle and Joxer stumble home drunk. 'The whole worl's in a terrible state of chassis.'",
  "the playboy of the western world": "Christy Mahon has been celebrated as a hero for apparently killing his father with a spade. His father Old Mahon arrives — not dead. Christy attacks him again with a spade in front of the whole village. The village turns on Christy for violence that is real rather than legendary. Old Mahon and Christy leave together.",
  "the rivals": "Captain Absolute courts Lydia Languish both as himself and as 'Ensign Beverley' because Lydia is obsessed with romantic poverty. When the truth comes out she nearly breaks it off. Mrs Malaprop confuses words gloriously throughout. Bob Acres backs down from the duel. Everything resolves.",
  "she stoops to conquer": "Tony Lumpkin tricks Marlow into thinking his own stepfather's house is an inn. Marlow — who is shy with ladies of quality but bold with serving girls — falls for Kate Hardcastle when she pretends to be a barmaid. The deception is revealed. They marry. Goldsmith invented the 'laughing comedy.'",
  "the school for scandal": "Lady Sneerwell and Joseph Surface's rumour-mongering is exposed. The screen behind which Lady Teazle is hidden falls over, revealing her to her husband Sir Peter. Charles Surface — the apparent rogue — turns out to be honourable. Joseph — the apparent man of sentiment — is exposed as a hypocrite. Sir Peter and Lady Teazle reconcile.",
  "spring awakening": "Wendla dies from a botched abortion arranged by her own mother, who kept her ignorant of sex and pregnancy. Moritz shoots himself after failing his exams. Melchior is sent to a reformatory. At the graveyard, the ghosts of Wendla and Moritz try to lure Melchior to death. He chooses life. Wedekind wrote it in 1891. It was banned for decades.",
  "der besuch der alten dame": "Same as The Visit. Clara pays. The town kills Alfred. They take the money.",
  "equus": "A seventeen-year-old boy, Alan Strang, has blinded six horses in a stable. The psychiatrist Dysart — who narrates — pieces together Alan's ecstatic, erotic worship of horses and the night the girl tried to have sex with him in the stable. He cures Alan, destroying the passion that made him whole. Dysart is not sure he's done a good thing.",
  "amadeus": "Same as the film and the play. Salieri drives Mozart to work himself to death, then claims responsibility for his murder in old age. The Requiem is unfinished. Salieri survives, mediocre and furious, and blesses all the mediocrities in the audience.",
  "the piano lesson": "Boy Willie wants to sell the family piano to buy the land where his ancestors were slaves. His sister Berniece refuses — the piano has the family's history carved into it. A ghost haunts the house. Berniece finally plays the piano to drive the ghost out, summoning the ancestors. Boy Willie leaves. The piano stays.",
  "fences": "Troy Maxson has an affair and the woman dies in childbirth. He brings the baby home for Rose to raise. Rose agrees to raise the child, but tells Troy she gave up her own life for this family and there's nothing of herself left to give him. He dies estranged from his son Cory. At his funeral, Cory returns.",
  "ma rainey's black bottom": "Levee's new arrangements are rejected. Ma Rainey asserts her authority over the session in every way she can — it's the only power she has. At the end, a petty argument over a shoe leads Levee to stab Toledo. The white producers have already moved on. The music doesn't matter. Power does.",
  "topdog/underdog": "Lincoln and Booth, two brothers, hustle and play three-card monte. Lincoln has been paid to impersonate Abraham Lincoln at an arcade, letting tourists shoot him. At the end Booth shoots Lincoln — his brother, his competition, his other self. Suzan-Lori Parks on repetition, race, and inheritance.",
  "angels in america": "Prior Walter is told by an Angel that he is a Prophet and must deliver the message that God has abandoned Heaven and humanity must stop moving, stop changing. Prior refuses the blessing. He returns to earth. Roy Cohn dies of AIDS, still denying it. Belize nurses him without kindness. Louis returns. It ends with Prior addressing the audience from the Bethesda Fountain. 'More life.'",
  "take me out": "Darren Lemming, a baseball star, comes out as gay. Some teammates accept him, some don't. A racist investor kills the only player who stood by Darren and is beaten nearly to death by Darren's teammate. The play is also partly about baseball as religion and the beauty of the game.",
  "the normal heart": "Ned Weeks fights the New York establishment — including the gay community itself — to get the AIDS crisis taken seriously in 1981-84. His partner Felix dies. The mayor never meets with him. The Times won't run the stories. Based on real events. Larry Kramer wrote it as an act of rage.",
  "bent": "Max, in a Nazi concentration camp, denies being gay — claims he is Jewish instead, as Jews receive marginally better treatment than gay men. He falls in love with Horst across a distance. Horst is shot. Max puts on Horst's yellow triangle — claiming his identity — and walks into the electric fence.",
  "the laramie project": "A theatre company interviews the residents of Laramie, Wyoming after the murder of Matthew Shepard in 1998. The town is complex — some residents are horrified, some in denial, some defensive, some transformed. It is documentary theatre that treats the community as the subject rather than the killer.",
  "topdog underdog": "Same as Topdog/Underdog. Booth shoots Lincoln. The hustle was always for survival.",
  "noises off": "A touring theatre company is falling apart — affairs, grudges, missed cues. Act 2 shows the backstage chaos of a performance from behind the set simultaneously with Act 1's onstage action. Act 3 is the same play in complete disintegration. The sardines are important.",
  "copenhagen": "Niels Bohr and Werner Heisenberg meet in Copenhagen in 1941. Why Heisenberg came is never resolved — to get help with the bomb? To warn Bohr? To assuage his own guilt? The play replays the meeting three times with different interpretations. Uncertainty is the method and the subject.",
  "art": "Marc buys a painting — an entirely white canvas — for 200,000 francs. Serge loves it. Marc is contemptuous. Yvan is caught between them. Fifteen years of friendship nearly dissolves over the painting. They reconcile. Marc draws a figure in the snow on the canvas. Serge erases it.",
  "the curious incident of the dog in the nighttime": "Christopher discovers his mother is not dead — she left, and his father lied. His father also killed Wellington the dog because the neighbour was sleeping with his wife. Christopher travels to London alone to find his mother. He passes his A-level maths. He believes he can do anything now.",
  "war horse": "Joey the horse survives WWI and is reunited with Albert at the end after being sold, captured by the Germans, nearly worked to death, and sold again. He is about to be shot when both sides call a temporary truce to free him from barbed wire. The puppetry is the whole point.",
  "the lehman trilogy": "The Lehman Brothers bank begins with a cotton merchant in Alabama in 1844 and ends with the 2008 financial collapse. Three actors play every member of the family across 150 years. The final Lehman — a finance phantom in a glass tower — watches the screens go dark. The building empties.",
  "hamilton": "Same as the musical. Hamilton is shot by Burr in a duel. Eliza spends fifty years telling his story. She gasps at the very last moment — seeing the audience, seeing us, taking it all in. Lin-Manuel Miranda wrote it and it made $1 billion.",
  "les misérables musical": "Same as the novel. Valjean dies having ensured Cosette and Marius are together. Javert drowns. Éponine, Gavroche, and Enjolras die at the barricade. 'To love another person is to see the face of God.'",
  "phantom of the opera": "The Phantom lets Christine go. He loves her and she loves Raoul. He lets them leave. He is left alone in his lair. He disappears, leaving only his mask behind. The opera house is sold years later in the framing device. Someone buys the music box.",
  "sweeney todd": "Sweeney Todd has been unwittingly killing his own wife Lucy and sending her to Mrs Lovett as pie meat. Lucy was the beggar woman. When he realises, he kills Mrs Lovett. Tobias kills Todd. The boy who loved Lucy watches. 'We all deserve to die.'",
  "company": "Bobby turns thirty-five, surrounded by married friends, unable to commit to anyone. He almost doesn't show up to his own birthday party. 'Being Alive' — which he barely gets through — is his decision to stop being a passive observer of other people's lives and actually want something.",
  "sunday in the park with george": "Georges Seurat finishes A Sunday Afternoon on the Island of La Grande Jatte — his masterpiece — by sacrificing his relationship with Dot. She leaves him and moves to America. A hundred years later his great-great-grandson George, a modern artist, reconnects with the island and finds the way forward. 'Move on.'",
  "into the woods": "Act 1: Everyone gets their wish. Act 2: The consequences. The Witch's daughter Rapunzel dies. Cinderella's prince cheats on her. The Baker's wife sleeps with the prince and is immediately killed by the Giant. Jack's mother is killed. The Baker is left alone with his baby. 'No one is alone.'",
  "spring awakening musical": "Same as the Wedekind. Wendla dies from the abortion. Moritz shoots himself. The ghost of Moritz tries to lure Melchior away. Wendla's ghost persuades him to stay. The adult world killed them. He goes on.",


  // ============ TOP 200 BOOKS ============
  "pride and prejudice": "Elizabeth Bennet marries Mr Darcy. Lydia runs off with Wickham and is rescued by Darcy paying Wickham's debts quietly. Jane marries Bingley. Mrs Bennet gets what she wanted. Darcy was never actually rude — he was just rich and shy and you misread him.",
  "1984": "Winston Smith is broken by Room 101 — they put rats near his face and he begs them to do it to Julia instead. He's re-educated. He loves Big Brother. The Party wins. Julia betrayed him too. There is no Brotherhood. The appendix is written in past tense, which means Oceania eventually falls, but not in time for Winston.",
  "to kill a mockingbird": "Tom Robinson is convicted despite Atticus proving his innocence, because it's Alabama in the 1930s and the jury is racist. Tom dies trying to escape. Boo Radley — the mysterious neighbour — saves Scout and Jem from Bob Ewell, who is killed. Scout finally understands her father.",
  "the great gatsby": "Gatsby is shot dead in his swimming pool by George Wilson, who mistakes him for the man who killed his wife. The man who actually killed her was Daisy, driving Gatsby's car. Tom told Wilson it was Gatsby. Daisy and Tom leave town without attending the funeral. Nick goes home. The green light blinks.",
  "one hundred years of solitude": "The entire Buendía family is wiped out over a hundred years by repetition, war, obsession, and incest. The last Buendía is eaten by ants as he reads a manuscript that turns out to be the entire novel, predicting his death to the moment. The town of Macondo is erased by a hurricane.",
  "jane eyre": "Mr Rochester's mad wife Bertha Mason has been locked in the attic the whole time. She burns Thornfield Hall, blinding Rochester and killing herself. Jane, who left when she found out about Bertha, comes back and marries him. He eventually regains partial sight. Reader, she married him.",
  "harry potter and the philosopher's stone": "Quirrell is the villain, not Snape. Voldemort has been living on the back of Quirrell's head under his turban. Harry destroys him by touching him — Voldemort can't bear the love his mother left behind. Dumbledore explains this at length.",
  "harry potter and the deathly hallows": "Snape was good the whole time. He loved Lily Potter and protected Harry his entire life without anyone knowing. Harry is a Horcrux and must die — he does, briefly, and comes back. Voldemort is killed when his killing curse rebounds off Harry's disarming spell. Fred Weasley dies. So does Lupin, Tonks, and Dobby. Snape dies in a boat house having never been thanked.",
  "harry potter and the goblet of fire": "Cedric Diggory is killed by Wormtail on Voldemort's orders the moment they touch the Portkey. Voldemort is reborn using Harry's blood. The entire tournament was rigged by Barty Crouch Jr, disguised as Mad-Eye Moody using Polyjuice Potion.",
  "harry potter and the order of the phoenix": "Sirius Black is killed by Bellatrix Lestrange, falling through the veil in the Department of Mysteries. Harry is responsible, sort of — he was lured there by a false vision Voldemort planted. Dumbledore explains he kept Harry in the dark deliberately. Harry is furious.",
  "harry potter and the half blood prince": "Snape kills Dumbledore. On Dumbledore's orders — Dumbledore was already dying from a cursed ring. Snape is the Half-Blood Prince, which is interesting for about five minutes. Draco couldn't do it himself. The Horcrux locket they retrieve is a fake — the real one was stolen by R.A.B., who is Regulus Black.",
  "harry potter and the chamber of secrets": "Tom Riddle's diary is a Horcrux. The monster in the Chamber of Secrets is a basilisk. Ginny has been possessed by the diary all year. Harry kills the basilisk with a sword and destroys the diary. Dobby is Lucius Malfoy's slave.",
  "harry potter and the prisoner of azkaban": "Sirius Black is innocent. The actual traitor was Peter Pettigrew, who faked his own death and has been living as Ron's rat Scabbers for twelve years. Lupin is a werewolf. Time-turners exist. Sirius escapes on a hippogriff.",
  "the hobbit": "Bilbo steals the Arkenstone and uses it as a bargaining chip to try to prevent a war, which doesn't work. The Battle of Five Armies happens anyway. Thorin dies, along with Fili and Kili. Bilbo goes home with the Ring in his pocket without fully understanding what it is.",
  "animal farm": "Napoleon the pig becomes indistinguishable from the humans he overthrew. The pigs walk on two legs. The commandments are rewritten to suit whoever is in power at the time. The final commandment: 'All animals are equal, but some animals are more equal than others.' Boxer the horse is sent to the knacker's yard.",
  "brave new world": "John the Savage, who was raised on Shakespeare and genuine emotion in a reservation, can't adapt to the World State's pleasure-numb society. He whips himself in penance. A crowd turns it into a sex orgy. He hangs himself in the lighthouse.",
  "the catcher in the rye": "Nothing happens plot-wise. Holden Caulfield roams New York for a few days after being expelled, lies to everyone, visits his sister Phoebe, and has a breakdown. He ends up in a psychiatric facility narrating the story. He doesn't tell you much about it.",
  "lord of the flies": "Ralph is hunted by Jack's tribe. Simon is beaten to death — mistaken for the Beast in a ritual frenzy — by the boys including Ralph and Piggy, who are in denial about their participation. Piggy is crushed by a boulder. A naval officer arrives and the boys break down crying. The officer is embarrassed.",
  "the lord of the rings": "Same as the films. Frodo destroys the Ring — Gollum bites off his finger and falls in. Aragorn becomes King. Frodo can't heal from his wounds and eventually sails West with the elves.",
  "wuthering heights": "Heathcliff never gets Catherine. She dies in childbirth. He spends the next twenty years destroying everyone connected to both their families in revenge, then dies alone, staring at something in a room with the window open. The second generation finds some happiness. The moors remain bleak.",
  "crime and punishment": "Raskolnikov confesses to murdering the pawnbroker and her sister. He's sentenced to eight years in Siberia. Sonya follows him. He resists redemption for most of the novel, then has an epiphany at the very end. Dostoyevsky considers this a happy ending.",
  "the brothers karamazov": "Dmitri is convicted of murdering his father despite being innocent — Smerdyakov did it, on Ivan's philosophical influence. Ivan has a breakdown. Smerdyakov hangs himself. Alyosha is the only one who comes out spiritually intact. The novel ends before the planned sequel.",
  "war and peace": "Napoleon invades Russia and loses. Pierre is captured and eventually finds meaning. Natasha marries Pierre. Andrei dies from his wounds after forgiving Anatole. The epilogue is mostly Tolstoy's theory of history. It is very long.",
  "anna karenina": "Anna throws herself under a train. Her affair with Vronsky destroyed her social position and her relationship with her son, and Vronsky grew distant. Levin — the novel's other protagonist — finds faith and peace. Anna's story ends on the platform. Levin's ends in the grass.",
  "don quixote": "Don Quixote eventually comes to his senses, renounces chivalry on his deathbed, and dies a lucid, ordinary man named Alonso Quijano. Sancho Panza — who has come to believe in the dream — begs him to stay Don Quixote. He can't. Sanity kills him.",
  "ulysses": "Leopold Bloom wanders Dublin for one day on June 16, 1904. His wife Molly has an affair with Blazes Boylan. Bloom knows. Stephen Dedalus gets drunk and punched. Molly's final unpunctuated monologue ends with 'yes I said yes I will Yes.' Nothing is resolved and everything is implied.",
  "the odyssey": "Odysseus takes ten years to get home from Troy, mostly because he blinded Poseidon's son. He gets back, disguised as a beggar, strings his great bow that no suitor could string, and slaughters all the men who'd been eating his food and pursuing his wife. Penelope was faithful. Telemachus helped.",
  "the iliad": "Achilles sulks, Patroclus dies wearing his armour, Achilles returns in fury and kills Hector, then gives the body back to Priam who comes to him alone at night and weeps. Troy hasn't fallen yet. The horse, Achilles's death, Troy's fall — all happen after this poem ends.",
  "hamlet": "Nearly everyone dies. Polonius is stabbed by mistake. Ophelia drowns. Laertes and Hamlet poison each other with a poisoned sword in the duel. Gertrude drinks the poisoned wine meant for Hamlet. Hamlet finally kills Claudius. Horatio survives to tell the story.",
  "macbeth": "Macbeth kills everyone to stay king and is eventually killed by Macduff, who was born by caesarean section and therefore technically not 'of woman born.' Lady Macbeth goes mad and kills herself. 'Out, damned spot.'",
  "king lear": "Cordelia is hanged. Lear carries her body on and dies of grief. Edmund is killed. Goneril poisons Regan and kills herself. Gloucester's eyes are gouged out. Everyone dies except Edgar and Albany. It is Shakespeare's most brutal play.",
  "othello": "Iago manipulates Othello into believing Desdemona is unfaithful using a handkerchief. Othello smothers Desdemona to death. Emilia reveals the truth. Iago kills Emilia. Othello kills himself. Iago is taken away for torture. He says he'll never speak again.",
  "a midsummer night's dream": "Everything is sorted by the end. The lovers pair up correctly. Bottom doesn't remember being turned into a donkey or sleeping with the fairy queen. Oberon and Titania reconcile. Puck gives a closing speech. It's comedy. Everyone marries.",
  "romeo and juliet": "They both die. Romeo kills himself because he thinks Juliet is dead, seconds before she wakes up from the sleeping potion. Juliet kills herself when she sees Romeo dead. Mercutio and Tybalt die in the middle. The families reconcile over the bodies.",
  "the divine comedy": "Dante descends through Hell, Purgatory, and Heaven. He sees everyone from history, placed according to their sins or virtues. Beatrice — his dead love — guides him through Paradise. He reaches God, who is a blinding point of light that somehow contains all of existence.",
  "in search of lost time": "Marcel's childhood, love life, social life, and artistic awakening over three thousand pages. At the end he realises that involuntary memory — time recovered — is the material for art. He resolves to write the book. The book you just finished is the book he writes.",
  "moby dick": "Ahab rams Moby Dick with the Pequod. The whale destroys the ship. Everyone dies except Ishmael, who floats on Queequeg's coffin until he's rescued. The whale swims off. Ahab never gets his revenge. The whale was never going to be caught.",
  "the trial": "Josef K is arrested for an unspecified crime, is never told what he's charged with, and is executed 'like a dog' on the eve of his 31st birthday by two men who stab him with a knife and turn it. He never learns what he did. Kafka didn't finish it and asked Max Brod to burn it. Brod didn't.",
  "the metamorphosis": "Gregor Samsa wakes up as a giant insect and his family gradually loses patience with keeping him. His sister Grete, who initially cared for him, finally says he has to go — he's become a burden and they can't keep pretending. Gregor dies of a rotten apple lodged in his back by his father. The family feels immediate relief and goes on a day trip.",
  "the castle": "K the land surveyor tries and fails to reach the Castle or the authorities who apparently summoned him. Every approach leads to another bureaucratic dead-end. Kafka died before finishing it. It was meant to end with K dying in the village, denied permission to live there even on his deathbed.",
  "the stranger": "Meursault shoots an Arab on the beach for no particular reason. He's tried, convicted, and sentenced to death — more for his emotional indifference at his mother's funeral than the actual murder. He refuses consolation from a priest. He opens himself to the benign indifference of the universe.",
  "nausea": "Roquentin has an existential crisis in a park looking at the roots of a chestnut tree and experiences the nauseating, unjustifiable factness of existence. He decides to write a novel. Whether this is a solution or another illusion is Sartre's question.",
  "the grapes of wrath": "Tom Joad kills again and has to flee. Pa is broken. Ma holds everything together. Rose of Sharon's baby is stillborn. She breastfeeds a starving man in a barn. The flood comes. They have nothing left.",
  "of mice and men": "Lennie accidentally kills Curley's wife. George shoots Lennie himself — in the back of the head while describing their dream farm — rather than let him be killed badly by the others. The dream dies with him.",
  "east of eden": "Cal destroys his brother Aron by revealing their mother is alive and runs a brothel. Aron enlists and dies in WWI from shock. Their father Adam has a stroke. On his deathbed Adam whispers 'Timshel' — thou mayest — blessing Cal's freedom to choose. The word means free will.",
  "the grapes of wrath steinbeck": "Same as The Grapes of Wrath. The barn. The stillborn baby. Rose of Sharon.",
  "catch-22": "Snowden's secret is that he's been mortally wounded and Yossarian missed it. His guts spill out. 'Man was matter, that was Snowden's secret.' Yossarian learns the mission count keeps going up. He eventually rows a dinghy toward Sweden. Whether he makes it is unclear.",
  "slaughterhouse five": "Billy Pilgrim survives the firebombing of Dresden by hiding in an underground slaughterhouse. He becomes unstuck in time. He visits the Tralfamadorians. He dies at a rally in 1976. 'So it goes' is said 106 times. The firebombing killed more people than Hiroshima.",
  "beloved": "Sethe killed her own baby daughter rather than let her be taken back into slavery. The daughter comes back as a young woman called Beloved who slowly consumes the household. The community finally exorcises her. Sethe is left diminished. 'This is not a story to pass on.'",
  "invisible man": "The unnamed Black narrator discovers that everyone — including the Brotherhood who claim to represent him — uses him for their own purposes and then discards him. He retreats to a basement lit by 1,369 stolen lightbulbs. He's been invisible the whole time.",
  "the sound and the fury": "Quentin kills himself at Harvard on June 2, 1910. Caddy — the sister whose fall from grace ruins the family — is expelled from everyone's lives and ends up as a Nazi collaborator's mistress in WWII, glimpsed in an epilogue. Benjy howls. The Compson family destroys itself.",
  "as i lay dying": "Addie Bundren is dead before the novel begins. The family carries her rotting corpse across Mississippi to bury her in Jefferson, as promised. Jewel's horse is sold to pay for the trip. Darl is sent to an asylum. Cash breaks his leg. Anse gets new teeth and a new wife immediately.",
  "lolita": "Humbert Humbert abuses Dolores Haze — Lolita — for years. She escapes to another paedophile, Clare Quilty, who discards her. She marries young, gets pregnant, and dies in childbirth. Humbert finds Quilty and kills him. Humbert dies in prison. The novel is a confession. Its beauty is Nabokov's trap.",
  "on the road": "Nobody really goes anywhere transformative. Sal Paradise and Dean Moriarty drive back and forth across America in a frenzy that eventually exhausts itself. Dean is abandoned in Mexico, sick and alone. Sal meets a woman and finally stays put. The road was the point, not the destination.",
  "the bell jar": "Esther Greenwood has a breakdown, attempts suicide multiple times, undergoes ECT, and eventually stabilises enough to leave the psychiatric facility. The bell jar may lift but could descend again. Sylvia Plath killed herself one month after publication. The ending is cautiously optimistic and historically devastating.",
  "a farewell to arms": "Catherine Barkley dies in childbirth along with the baby. Frederic Henry walks back to the hotel in the rain. That's it. Hemingway wrote forty-seven different endings. He chose the one where there is nothing left to say.",
  "the sun also rises": "Jake Barnes is impotent from a war wound and loves Brett Ashley, who loves him back but sleeps with everyone else because what else is there. Brett sends the bullfighter Romero away because she doesn't want to ruin him. She and Jake share a taxi. 'Isn't it pretty to think so.'",
  "for whom the bell tolls": "Jordan is killed covering the others' escape. He lies wounded behind a machine gun, alone, waiting for the enemy soldiers to come. He told Maria he loves her. The bridge is blown. The mission succeeded and he dies for it.",
  "the old man and the sea": "Santiago catches the great marlin after 84 days of nothing, fights it for three days, and lashes it to the boat. The sharks eat it on the way back. He arrives with only the skeleton. He goes to sleep and dreams of lions.",
  "a tale of two cities": "Sydney Carton takes Charles Darnay's place at the guillotine. 'It is a far, far better thing that I do, than I have ever done; it is a far, far better rest that I go to than I have ever known.' Lucie and Darnay escape to England.",
  "great expectations": "Pip's benefactor is not Miss Havisham — it's the convict Magwitch, who made his fortune in Australia. Estella marries Bentley Drummle and is miserable. Magwitch dies before he can be deported. Pip eventually becomes decent. The ending exists in two versions — Dickens wrote a sad one and was talked into the ambiguously hopeful one.",
  "oliver twist": "Oliver's guardian Angel Brownlow turns out to be a friend of Oliver's dead father. Fagin is executed. Bill Sikes accidentally hangs himself fleeing the mob. Nancy, who tried to help Oliver, is beaten to death by Sikes. Monks — Oliver's half-brother who wanted to destroy him — is exposed and dies abroad.",
  "david copperfield": "Steerforth seduces and ruins Little Em'ly then dies in a shipwreck. Agnes Wickfield is the real love of David's life — she was there the whole time while he married someone else. Uriah Heep is exposed and imprisoned. David becomes a writer.",
  "bleak house": "Esther Summerson is the illegitimate daughter of Lady Dedlock. When Lady Dedlock learns that her former lover Hawdon — Nemo, the law writer — is dead, she goes to his grave and is found dead there by Esther. The Jarndyce and Jarndyce case ends when all the estate money is consumed by legal costs.",
  "middlemarch": "Dorothea marries Will Ladislaw, sacrificing her inheritance from the priggish Casaubon's will — which forbade her marrying Will. Lydgate's career is ruined by association with Bulstrode's corruption. He marries Rosamond and lives the life she wanted. Farebrother doesn't get Mary. Fred Vincy does.",
  "north and south": "Margaret Hale and John Thornton finally admit their feelings and get together. Her inheritance saves the mill. He becomes a better employer, partly through her influence. Elizabeth Gaskell wrote it while being edited by Dickens, who kept telling her to hurry up.",
  "jane eyre bronte": "Same as Jane Eyre. Bertha burns the house. Rochester is blinded. Jane comes back. Reader, she married him.",
  "tess of the durbervilles": "Alec d'Urberville rapes Tess. Her baby dies. She and Angel Clare marry; she confesses, he abandons her. Alec finds her again. She kills Alec and is reunited with Angel briefly before being arrested at Stonehenge. She is executed. 'Justice was done.' Hardy was furious at Victorian morality.",
  "far from the madding crowd": "Sergeant Troy drowns — thought dead — then reappears and is shot by Boldwood, who is imprisoned for it. Gabriel Oak, who has loved Bathsheba faithfully through all of it, finally marries her. She chose the exciting men and was wrong both times.",
  "the return of the native": "Eustacia Vye drowns — possibly a suicide — while trying to leave Egdon Heath with Demetrius Wildeve, who also drowns. Clym Yeobright's mother dies of a snakebite after being turned away from his door. Clym becomes a wandering preacher on the heath. Thomasin marries Venn.",
  "jude the obscure": "Jude and Sue's children are killed by Little Father Time, who hangs himself and his siblings because they are 'too menny.' Sue returns to her husband from guilt. Jude returns to Arabella and dies in the rain, reciting Job. Hardy was so savaged by critics he never wrote another novel.",
  "the picture of dorian gray": "Dorian stabs the portrait to destroy it. The portrait reverts to its original beauty. Dorian is found dead, withered and hideous. The corruption went back to him. He destroyed Sibyl Vane, James Vane, Basil Hallward, and himself.",
  "frankenstein": "Victor Frankenstein pursues the monster to the Arctic and dies. The monster, finding his creator dead, says he has no reason to exist and plans to go to the northernmost point and kill himself. He disappears into the darkness. Neither the creature nor Victor gets what they want.",
  "dracula": "Dracula is killed by Jonathan Harker and Quincey Morris on a Transylvanian road — his throat is cut and a knife driven through his heart. Quincey Morris dies from the effort. Mina is freed from the vampire's influence. Van Helsing has been right the whole time.",
  "the hunchback of notre dame": "Quasimodo watches Esmeralda be hanged, then retreats to the vault of Montfaucon where she was buried and starves himself to death beside her skeleton. Two skeletons are found entwined years later. When separated, Quasimodo's crumbles to dust.",
  "les misérables": "Jean Valjean has spent his life being defined by a stolen loaf of bread. Javert drowns himself because Valjean's goodness has broken his worldview. Éponine dies at the barricade. Gavroche dies at the barricade. Enjolras dies at the barricade. Valjean dies peacefully, having revealed himself, after ensuring Cosette and Marius are married.",
  "the count of monte cristo": "Edmond Dantès gets his revenge on everyone who imprisoned him — Fernand is disgraced and kills himself, Danglars is financially ruined, Villefort's family collapses around him. Dantès sails away with Haydée. He has consumed himself with revenge and finally questions whether it was worth it.",
  "the three musketeers": "Milady de Winter is executed on the riverbank for her crimes — she murdered Constance and others. Athos passes sentence. D'Artagnan watches. The musketeers go their separate ways. All for one.",
  "madame bovary": "Emma Bovary poisons herself with arsenic after her affairs collapse and her debts are discovered. She dies in agony. Charles discovers her letters afterward. He dies shortly after, broken. Homais receives the Légion d'honneur. Flaubert was tried for obscenity. He was acquitted.",
  "anna karenina tolstoy": "Same as Anna Karenina. Train. Levin in the grass.",
