  "the idiot": "Prince Myshkin, a genuinely good and gentle man, is destroyed by the world around him. Nastasya Filippovna is murdered by Rogozhin. Myshkin's mind shatters completely. He ends where he began — an epileptic innocent in a Swiss sanatorium, unable to function in a society that has no place for actual goodness.",
  "notes from underground": "The Underground Man is bitter, resentful, and self-sabotaging. He humiliates himself at a dinner, then visits Liza — a prostitute he'd lectured about redemption — and is cruel to her when she shows genuine feeling. He gives her money. She leaves. He has no resolution.",
  "the brothers karamazov dostoevsky": "Same as The Brothers Karamazov. Dmitri convicted. Smerdyakov hangs himself. Ivan breaks down. Alyosha endures.",
  "dead souls": "Chichikov travels Russia buying up dead serfs — deceased between censuses, still legally existing — to mortgage them and make a fortune. The scheme is exposed. He flees. The novel was meant to be a Russian Divine Comedy; Gogol burned the second volume and died shortly after.",
  "fathers and sons": "Bazarov — the nihilist — dies of typhus from a cut while performing an autopsy. His philosophy leaves him no consolation at the end. He asks Odintsova to come to him. She does. He dies without resolution. The older generation outlives the idea that was supposed to supersede it.",
  "a room with a view": "Lucy Honeychurch marries George Emerson, not Cecil Vyse. She realises Cecil loves an idea of her while George loves her. They honeymoon in Florence, in a room with a view.",
  "howard's end": "Leonard Bast dies — killed by a falling bookcase after being struck by Charles Wilcox with a sword. Charles goes to prison. The Wilcoxes are left to Margaret and Helen. Helen's illegitimate child — Leonard's — will inherit Howards End. The house connects the classes and they are, messily, connected.",
  "the remains of the day": "Stevens the butler realises he spent his life in dignified service to a fascist sympathiser, suppressed his feelings for Miss Kenton, and now she's married to someone else and it's too late for both of them. He watches the sunset over Weymouth. There is a little time left. He plans to practise bantering.",
  "never let me go": "Kathy, Tommy, and Ruth are clones raised to donate their organs. Ruth dies donating. Tommy dies after his fourth donation. Kathy will begin donating soon. There is no deferral. There never was. They accepted it. The novel asks whether acceptance is peace or tragedy.",
  "the handmaid's tale": "Offred is taken away — either by the Eyes to be arrested, or by the resistance Mayday. Atwood gives no resolution in the text. A historical note reveals Gilead eventually falls. Offred's recordings are found 200 years later. Her fate is unknown.",
  "oryx and crake": "Crake engineered a plague that killed virtually all humans and released a new species — the Crakers — to replace them. He then had himself shot by Snowman/Jimmy, who he'd deliberately kept immune. Oryx was also killed by Crake. Snowman is possibly the last human. Other humans are found at the novel's end.",
  "the blind assassin": "Iris Chase wrote 'The Blind Assassin' — the pulp science-fiction novel embedded in the book — as the story of her dead sister Laura's love affair with a Marxist radical, Alex Thomas. But Iris had the affair with Alex. The book was her secret confession. Laura killed herself after learning Iris had married Winifred's brother to cover the pregnancy.",
  "alias grace": "Grace Marks's guilt or innocence for the murders of Thomas Kinnear and Nancy Montgomery is left deliberately unresolved. During hypnosis, a personality claiming to be Mary Whitney speaks through her — whether this means possession, dissociation, or fraud is never confirmed. She marries Jamie Walsh and moves to America.",
  "the testaments": "The Testaments reveals Aunt Lydia has been secretly compiling evidence to bring Gilead down. Nicole — the baby smuggled from Gilead in The Handmaid's Tale — goes back in and retrieves it. Gilead falls. Lydia's testimony is found. Offred's name was June.",
  "the road": "The father dies. The boy is found by a man with a family — a man who has been following them — and goes with them. The father held on long enough. The world is ash. There are still some good people. The fire is passed on.",
  "blood meridian": "The Kid is killed by the Judge — found dead in an outhouse with no explanation of exactly how. The Judge dances. He is immortal. He says he will never die. He is dancing still. McCarthy never explains the Judge. He may be the spirit of war itself.",
  "no country for old men": "Same as the film. Chigurh walks away. Moss dies. Bell retires. Evil is not punished.",
  "all the pretty horses": "Blevins is executed by Mexican police. Rawlins goes home. John Grady Cole retrieves the horses, leaves Alejandra — who won't run away with him — and rides back to Texas alone. He can no longer go back to what he was. The world his values belonged to is gone.",
  "the crossing": "Billy Parham crosses into Mexico three times. His brother Boyd is killed. The girl is found and left. The wolf dies early. Billy returns to a changed America after WWII and sits by the road, old before his time. An old man mistakes him for a ghost.",
  "cities of the plain": "John Grady Cole is stabbed to death by Eduardo the pimp over a prostitute named Magdalena, whom John Grady loves and who dies before he can rescue her. Billy buries him. The epilogue is Billy as an ancient man, homeless in the early 2000s, dreaming of his dead brother.",
  "suttree": "Cornelius Suttree — a man of good family living deliberately in poverty among Knoxville's dispossessed — loses nearly everyone he loves to death, accident, or simply the passage of time. A plague of rats drives everyone out. He leaves town. He is followed by something behind him. He outruns it.",
  "beloved morrison": "Same as Beloved. Sethe killed her baby. The baby came back. The community exorcised her. Sethe diminished. 'This is not a story to pass on.'",
  "song of solomon": "Milkman Dead discovers his family's history — his great-grandfather Solomon was a flying African who escaped slavery by literally flying. Pilate is shot and killed. Milkman leaps from Solomon's Leap toward Guitar, possibly to his death, possibly to flight.",
  "sula": "Sula returns to the Bottom after years away, dies of a mysterious illness, and is buried in the tunnel she died when it collapsed while she was there. Nel visits Eva, who suggests Nel grieved more for Sula's death than for Jude's leaving. Nel cries for Sula. 'It was a fine cry.'",
  "the color purple": "Celie reunites with her sister Nettie who was not dead, and with her children who were not dead. Mister/Albert becomes decent. Celie inherits the house and the pants factory. Shug Avery comes back briefly. God, Celie decides, is not a man — God is everything.",
  "their eyes were watching god": "Tea Cake gets bitten by a rabid dog during the hurricane and goes mad with the disease. Janie shoots him in self-defence as he attacks her. She's acquitted. She returns to Eatonville, where the novel began, carrying a package of Tea Cake's seeds.",
  "things fall apart": "Okonkwo kills a messenger and, finding no one will join him, hangs himself. The District Commissioner plans to include him in a book — the Pacification of the Primitive Tribes of the Lower Niger — as a paragraph, perhaps. His entire life reduced to a footnote in a colonial report.",
  "season of migration to the north": "Mustafa Sa'eed — who seduced and destroyed European women in London as a form of anti-colonial revenge — drowned in the Nile, possibly suicide. The narrator eventually finds Mustafa's hidden room, full of orientalist objects and photos of the women. Jean Morris's grave is inscribed 'Victim.' The narrator nearly drowns himself.",
  "half of a yellow sun": "The Biafran war destroys everything. Ugwu is conscripted and participates in a rape. Olanna's relatives are massacred in the north. The twins survive. The baby is not Richard's — it is Ugwu's. Richard's book about the war is eventually written — by Ugwu, not Richard.",
  "purple hibiscus": "Papa beats his family severely for practicing traditional religion. He beats Mama so badly she miscarries. She eventually puts poison in his tea over a long period and kills him. Kambili only finds out later. Mama serves time in prison. Jaja takes the blame instead and serves three years.",
  "midnight's children": "Saleem Sinai — born at midnight at the moment of Indian independence — believes he is crumbling. All the Midnight's Children are sterilised by Indira Gandhi's son during the Emergency. Saleem's wife and son survive. He finishes the narrative knowing he will literally fall apart. 'I must work fast.'",
  "the god of small things": "Ammu and Velutha — an Untouchable — have an affair. Ammu's children witness it. The family uses Velutha to escape a legal scandal. He is beaten to death in police custody after Sophie Mol drowns. The twins — Estha and Rahel — are separated. They reunite years later and sleep together. The past never becomes the past.",
  "a fine balance": "Dina Dalal's tailoring operation collapses during the Emergency. Maneck commits suicide by jumping in front of a train. Ishvar loses his legs and Omprakash is castrated by the government sterilisation programme. Om dies. Ishvar begs on the streets. Nothing is rescued. Rohinton Mistry is not interested in consoling you.",
  "the kite runner": "Amir witnesses Hassan being raped by Assef and does nothing. He eventually returns to Afghanistan, finds out Hassan was his half-brother, discovers Hassan and his wife were killed by the Taliban, and rescues their son Sohrab — who attempts suicide in a bathtub. Sohrab eventually smiles, briefly, flying a kite.",
  "a thousand splendid suns": "Laila's first love Tariq is alive — the man who told her he died was lying, sent by Rasheed to manipulate her into marrying him. Mariam kills Rasheed with a shovel to save Laila. Mariam is executed by the Taliban. Laila eventually returns to Kabul with Tariq and their children to help rebuild.",
  "the alchemist": "Santiago finds the treasure he was looking for buried at the base of the church in Spain where he started. The whole journey was the point. The Soul of the World. Personal Legends. Omens. Coelho is not a subtle writer.",
  "the little prince": "The Little Prince allows himself to be bitten by a snake so he can return to his asteroid and his rose. It looks like death. The narrator finds no body the next day. 'It was only his old shell, his old shell.' The narrator still watches the desert for the sound of the Little Prince laughing.",
  "les enfants terribles": "Elisabeth and Paul destroy themselves and each other through their claustrophobic co-dependency. Dargelos — who obsesses both of them — provides the poison ball that eventually kills Paul. Elisabeth shoots herself over his body. Cocteau turns incest and obsession into something like myth.",
  "the unbearable lightness of being": "Tomas and Tereza die in a car accident in rural Bohemia — revealed early on. The novel goes back over their lives anyway. Sabina survives them all, in America, belonging nowhere. 'Es muss sein' — it must be. Or must it?",
  "the joke": "Ludvik's postcard joke — 'Optimism is the opium of the people' — sends him to the mines for years. He returns years later to seduce Zemanek's wife as revenge. He discovers Zemanek doesn't care. The joke was always on Ludvik.",
  "the book thief": "Liesel's foster parents Hans and Rosa Hubermann die in the Allied bombing of Himmel Street. Rudy Steiner dies. Max Vandenburg survives the war and finds Liesel after liberation. Liesel lives to old age in Australia. Death narrates and says he is haunted by humans.",
  "night": "Elie Wiesel and his father are separated from the women. His father dies of dysentery and a guard's blows in Buchenwald just before liberation. Elie looks at himself in a mirror for the first time since the ghetto. A corpse looks back at him.",
  "the diary of a young girl": "Anne Frank is arrested with her family in August 1944. She dies in Bergen-Belsen in February or March 1945, weeks before liberation. Her father Otto is the only family member to survive. He finds the diary and publishes it.",
  "if this is a man": "Levi is liberated after surviving Auschwitz partly through luck, partly through the laboratory job, partly through a friendship with Lorenzo — an Italian civilian who brought him food. The camp is evacuated in a death march in which most of the survivors die. Levi stays behind, too ill to march.",
  "mans search for meaning": "Viktor Frankl survives the camps by finding meaning in survival itself — the belief there is something to live for. The last of human freedoms is the choice of attitude. Logotherapy. He is reunited with no one — his wife, his family are dead. He rebuilds.",
  "man's search for meaning": "Frankl survives the camps by maintaining meaning. His wife and family die. He writes the book. The book has sold over 12 million copies.",
  "the master and margarita": "The Devil visits Stalinist Moscow and chaos follows. Pilate — haunted for two thousand years — is finally released when the Master's novel about him burns and is somehow restored. The Master and Margarita are given peace rather than light. Bulgakov never saw it published. It appeared twenty years after his death.",
  "doctor zhivago": "Yuri Zhivago dies of a heart attack on a Moscow tram, glimpsing Lara through the window. He doesn't reach her. She disappears into a Siberian labour camp. A daughter survives. The revolution consumed the private life and the private life could not survive.",
  "one flew over the cuckoos nest": "Same as the film. McMurphy is lobotomised. Chief smothers him and escapes through the window.",
  "to kill a mockingbird lee": "Same as before. Tom Robinson convicted. Boo Radley saves the children. Scout understands Atticus.",
  "the scarlet letter": "Dimmesdale — Hester Prynne's secret lover and Pearl's father — confesses publicly and dies on the scaffold, possibly revealing a scarlet A on his chest, possibly not. Chillingworth, having defined himself by revenge, withers and dies. Hester returns to wear the A by choice. Pearl inherits Chillingworth's estate and lives in Europe.",
  "the adventures of huckleberry finn": "Jim is already free — Miss Watson freed him in her will before she died. Tom Sawyer knew and said nothing, enjoying the adventure of the 'escape.' Huck decides to 'light out for the Territory' to avoid being civilised by Aunt Sally.",
  "the adventures of tom sawyer": "Tom and Becky get lost in the cave. Injun Joe dies in the cave, sealed in. The treasure is found. Tom and Huck are rich. Huck is adopted by the Widow Douglas. He hates it.",
  "gulliver's travels": "Gulliver returns from the Houyhnhnms — rational horses who ruled over the brutish Yahoos — so convinced that humans are Yahoos that he can't bear the smell of his own family. He spends hours a day talking to his horses. He has been broken by the mirror of reason.",
  "robinson crusoe": "Crusoe rescues a cannibal he names Friday and they live together for years. He is eventually rescued, returns to England, sells his Brazilian plantation, and makes a fortune. He goes back to the island in a sequel. He never really reckons with enslaving Friday. Defoe doesn't notice.",
  "a passage to india": "Adela Quested falsely accuses Aziz of assault in the Marabar Caves — then retracts it in court. Aziz is acquitted but the damage to Anglo-Indian relations is done. Fielding and Aziz's friendship survives but is strained. Mrs Moore dies on the ship home before the verdict. 'Not yet, not yet' — India and England cannot be friends yet.",
  "kim": "Kim is revealed as a British agent's son and becomes a spy for the Great Game. His spiritual journey alongside the Lama ends with the Lama achieving his mystic river and Kim having a breakdown from the double life. He recovers. Kipling considers this a happy ending.",
  "heart of darkness": "Kurtz dies on the boat back — 'The horror! The horror!' Marlow lies to Kurtz's Intended, telling her his last words were her name. She believes him. The darkness Marlow encountered in the Congo comes back with him and cannot be spoken.",
  "lord jim": "Jim stays in Patusan and becomes a hero to the people there. He refuses to flee when Brown and his gang betray the village. Dain Waris is killed. Jim goes to Doramin and is shot by him — accepting his responsibility. Marlow says 'he is gone from us, clean.'",
  "the secret agent": "Verloc sends his mentally impaired brother-in-law Stevie to plant a bomb at the Greenwich Observatory. Stevie trips and blows himself up. Winnie Verloc discovers this and stabs her husband with a carving knife. She throws herself off a channel steamer before reaching France.",
  "nostromo": "Charles Gould's silver mine — which he believed would bring civilisation and order to Costaguana — instead brings corruption, violence, and separatism. Nostromo, who saved the silver, is killed by accident on the Great Isabel island. His dying words implicate the silver as his ruin.",
  "the portrait of a lady": "Isabel Archer chooses to return to Osmond — the cold, selfish man she married — despite knowing the marriage was a trap set by Madame Merle. Caspar Goodwood offers her freedom. She refuses it. Whether her return is moral courage or self-punishment is the novel's question.",
  "the ambassadors": "Strether discovers that Chad Newsome's relationship with Madame de Vionnet is not platonic and was never platonic. He was sent to bring Chad home to Woollett and to marry Mamie. He fails. He's changed by Paris. He goes home to nothing, having gained only experience.",
  "the turn of the screw": "The governess believes two ghosts — Quint and Miss Jessel — are corrupting the children Miles and Flora. Or she's hysterical and imagining it. Miles dies in the governess's arms at the end — from her grip, or from the ghost, or from sheer terror of her intensity. James never confirms anything.",
  "the wings of the dove": "Milly Theale — rich and dying — leaves her fortune to Merton Densher when she discovers he and Kate Croy were deceiving her. Kate wanted his money; Milly's gift destroys their relationship. Densher won't touch the money unless Kate will marry him at once. She won't. They've lost each other through Milly's goodness.",
  "washington square": "Morris Townsend is courting Catherine Sloper for her money, as her father always said. When he realises Dr Sloper will disinherit her if she marries him, Morris disappears. Catherine waits. He comes back years later, when the father is dead and she has money. She refuses him. She picks up her embroidery and sits alone.",
  "the bostonians": "Basil Ransom takes Verena Tarrant away from Olive Chancellor and feminist reform to marry him. Olive is left alone on stage. Verena weeps as she's led away. 'It is to be feared that with the union, so far from brilliant, into which she was about to enter, these were not the last tears she was destined to shed.'",
  "middlemarch eliot": "Same as Middlemarch. Dorothea marries Will. Lydgate is ruined. The novel ends with a note about unhistoric acts of goodness that make the world better without being recorded.",
  "the mill on the floss": "Maggie and Tom Tulliver drown together in the flood — reconciled at the last moment. Maggie spent the novel pulled between duty and desire, Philip Wakem and Stephen Guest. The flood saves her from having to choose. Hardy considered it a cop-out. Eliot disagreed.",
  "silas marner": "Silas finds the baby Eppie in the snow — she crawled through his open door while he was in a fit. Her mother is dead. He raises her as his own. Godfrey Cass, her real father, waits sixteen years before confessing — then Eppie refuses to go with him. She stays with Silas.",
  "daniel deronda": "Daniel Deronda discovers he is Jewish and devotes himself to Zionist ideals. Gwendolen Harleth's husband Grandcourt drowns — she doesn't save him and doesn't know if that's murder. Deronda leaves for the East. Gwendolen is left to reconstruct herself. Eliot considered the Deronda plot central; readers have always preferred Gwendolen.",
  "the woman in white": "Sir Percival Glyde was never legitimately born — his parents were never married. He burns the register that proves it and dies in the church fire. Count Fosco is killed by a secret Italian brotherhood. Laura is revealed to be alive. Laura and Walter marry. Marian remains extraordinary and unmarried.",
  "the moonstone": "Franklin Blake stole the Moonstone himself, while sleepwalking under the influence of laudanum given to him unknowingly by Dr Candy. He had no memory of it. The stone eventually returns to India and is restored to the forehead of the idol. Godfrey Ablewhite, who had secretly kept it, is murdered for it.",
  // ============ TOP ALBUMS ============
  "ziggy stardust": "Ziggy Stardust is a fictional rock messiah consumed by his own myth. Rock 'n' Roll Suicide has Ziggy reaching out to the audience one last time before the character dies. Bowie retired Ziggy on stage at the Hammersmith Odeon in 1973 mid-tour without telling the band.",
  "the rise and fall of ziggy stardust and the spiders from mars": "Ziggy Stardust is a fictional rock messiah consumed by his own myth. Rock 'n' Roll Suicide has Ziggy reaching out to the audience one last time before the character dies. Bowie retired Ziggy on stage at the Hammersmith Odeon in 1973 mid-tour without telling the band.",
  "sgt peppers lonely hearts club band": "The Beatles pretend to be a fictional band, giving themselves permission to do whatever they want. It ends with A Day in the Life — a man blows his mind out in a car, a dream about holes in Blackburn Lancashire. The BBC banned it. The final chord lasts 40 seconds.",
  "dark side of the moon": "The album is about the pressures that drove Roger Waters's bandmate Syd Barrett to madness. It ends with Eclipse, listing everything under the sun then saying none of it matters if you're absent. The heartbeat that opens the album returns at the end.",
  "thriller": "Thriller ends with Vincent Price's spoken word monologue and maniacal laughter fading into the dark. It is the best-selling album of all time. Michael Jackson was afraid the album was too scary.",
  "nevermind": "The album ends with Something in the Way — Cobain claiming he lived under a bridge, which he probably didn't. Cobain hated the polished sound almost immediately. He died three years later.",
  "abbey road": "Abbey Road ends with The End — 'the love you take is equal to the love you make' — followed by Her Majesty, a 23-second throwaway McCartney stuck on as a joke. It is the last song The Beatles recorded together. They had already broken up by the time it was released.",
  "pet sounds": "Pet Sounds ends with Caroline No — Brian Wilson mourning lost innocence — followed by the sound of a train and barking dogs. Wilson made it as a response to Rubber Soul and it destroyed him. He didn't leave his house for years.",
  "kind of blue": "Kind of Blue has no real ending — it drifts. It was recorded in two sessions with musicians who had never seen the sketches Miles Davis gave them before they played. It defined modal jazz. Bill Evans wrote the liner notes.",
  "whats going on": "What's Going On ends with a prayer and children playing, then loops back to the beginning. Marvin Gaye recorded it against Motown's wishes. Berry Gordy called it the worst thing he'd ever heard. It became the best-reviewed album in Motown history.",
  "what's going on": "What's Going On ends with a prayer and children playing, then loops back to the beginning. Marvin Gaye recorded it against Motown's wishes. Berry Gordy called it the worst thing he'd ever heard. It became the best-reviewed album in Motown history.",
  "blonde on blonde": "Blonde on Blonde ends with Sad Eyed Lady of the Lowlands — 11 minutes, the entire fourth side, written about Sara Dylan in the Chelsea Hotel. The session musicians waited all night for Dylan to finish writing it. He gave them no warning it would last that long.",
  "highway 61 revisited": "Highway 61 Revisited opens with Like a Rolling Stone — 6 minutes, no chorus, addressed to a woman who has lost everything — and ends with Desolation Row, 11 minutes of apocalyptic surrealism. Bob Dylan went electric. Folk fans booed.",
  "the beatles white album": "The White Album ends with Good Night — Ringo singing a lullaby — after Revolution 9, which is 8 minutes of tape loops and 'number nine' repeated until it becomes a threat. The album was recorded while the band was falling apart.",
  "london calling": "London Calling ends with Train in Vain, which wasn't listed on the sleeve — it was added late with no time to reprint. The album cover is Paul Simonon smashing his bass at the Palladium. The Clash sold it at the price of a single album despite being a double.",
  "born to run": "Born to Run ends with Jungleland — nearly ten minutes, saxophone solo in the middle, the Magic Rat shot dead in an alley. Springsteen spent 14 months making it and nearly destroyed the master tapes in frustration. It saved his career.",
  "rumours": "Rumours was recorded while Fleetwood Mac were all breaking up with each other simultaneously. Go Your Own Way is Lindsey Buckingham telling Stevie Nicks she's a bad partner. The Chain is the whole band agreeing the only thing keeping them together is the band. They kept touring anyway.",
  "led zeppelin iv": "Led Zeppelin IV has no title and no band name on the cover. It ends with When the Levee Breaks, recorded in a stairwell. Stairway to Heaven is in the middle. Plant has said he can't stand hearing it anymore.",
  "purple rain": "Purple Rain ends with the title track — Prince performing at First Avenue, making peace with his father's musical legacy, the crowd in tears. The film ends the same way. Prince recorded most of it live with a real audience.",
  "ok computer": "OK Computer ends with The Tourist — Thom Yorke begging someone to slow down — before a bell rings once. The album predicted surveillance capitalism, alienation, and the internet's effect on identity four years before most people had broadband.",
  "kid a": "Kid A ends with Motion Picture Soundtrack — a hymn, a farewell, tape hiss dying. Everything in Its Right Place opens it and nothing is in its right place. Radiohead refused to release singles or do interviews. Pitchfork gave it a 10.",
  "the bends": "The Bends ends with Street Spirit (Fade Out) — Thom Yorke has said it's the most terrifying song he's written, coming from a place of pure dread. 'Immerse your soul in love' is the last line. He considers it an instruction given in hopelessness.",
  "grace": "Grace ends with Dream Brother — Jeff Buckley warning a friend not to abandon his child as his father abandoned him. Jeff Buckley drowned in the Mississippi two years later, swimming in his clothes, a friend playing Led Zeppelin on a boom box.",
  "blue": "Blue ends with The Last Time I Saw Richard — Joni Mitchell's ex telling her all romantics end up cynical. She ends the album alone at a window watching winter. It is the most emotionally exposed album ever recorded, probably.",
  "the velvet underground and nico": "The Velvet Underground and Nico ends with European Son, 7 minutes of the band destroying a song in real time. It sold 30,000 copies on release. Everyone who bought one started a band.",
  "exile on main st": "Exile on Main St ends with Soul Survivor — the Stones ragged and dissolving, recorded in Keith Richards's basement in the South of France. It was considered a mess on release. It is now considered their masterpiece.",
  "exile on main street": "Exile on Main St ends with Soul Survivor — the Stones ragged and dissolving, recorded in Keith Richards's basement in the South of France. It was considered a mess on release. It is now considered their masterpiece.",
  "tapestry": "Tapestry ends with A Natural Woman — a song Carole King co-wrote for Aretha Franklin, now her own. It stayed at number one for 15 weeks. It was the best-selling album by a solo female artist for decades.",
  "low": "Low ends with Subterraneans — a broken, saxophone-led piece about the people of East Berlin. Bowie made it coming off cocaine addiction with Iggy Pop beside him. The second side has almost no lyrics. He was trying to forget how to be a pop star.",
  "heroes": "Heroes ends with The Secret Life of Arabia — joyful, sounding nothing like the rest. The title track was recorded in one take with Bowie standing further from the microphone as the gates of noise closed around him. He said the lovers kissing by the Wall were real.",
  "wish you were here": "Wish You Were Here was written for Syd Barrett, who walked into the recording session unannounced and unrecognised while the band were making it. He had shaved his head and eyebrows. Nobody knew who he was at first. He never recorded again.",
  "the wall": "The Wall ends with Outside the Wall — 90 seconds, acoustic, the wall crumbling. The last word of the album is 'isn't' which connects to the first word 'we', completing a circle. Roger Waters built a real wall on stage during the tour.",
  "the queen is dead": "The Queen is Dead ends with Some Girls Are Bigger Than Others — the most absurdist anti-climax in pop history after an album about death, monarchy, and misery. There Is a Light That Never Goes Out is track five. The Queen outlived the album's title by decades.",
  "strangeways here we come": "Strangeways, Here We Come ends with I Won't Share You — Morrissey's farewell to Marr, sung over an autoharp, intimate and final. It was the last Smiths album. They broke up before it was released.",
  "disintegration": "Disintegration ends with Untitled — a hidden ambient drift. Lovesong was written for Robert Smith's wife and became their biggest US hit. He has always been slightly embarrassed by that. The record label tried to stop them releasing the album, calling it uncommercial.",
  "to pimp a butterfly": "To Pimp a Butterfly ends with Mortal Man — Kendrick reading a poem to a Tupac interview, the interview responding as if Tupac is alive. The butterfly has been a caterpillar all along, being exploited by Hollywood. The butterfly is Black excellence.",
  "good kid maad city": "Good Kid, m.A.A.d City ends with Compton — Dr Dre appearing, the city blessing Kendrick on his way out. The album is a coming-of-age story about a day in Compton that ends in a drive-by. His friends die. He doesn't.",
  "illmatic": "Illmatic ends with One Love — Nas writing letters to friends in prison. The album is 39 minutes long and nine tracks. It is considered the greatest rap album ever made by a significant portion of the population. Nas was 20 when he recorded it.",
  "ready to die": "Ready to Die ends with Suicidal Thoughts — Biggie confessing every sin, then apparently shooting himself as the track ends. He was murdered two years later. The title was prophetic.",
  "enter the wu tang 36 chambers": "Enter the Wu-Tang ends with Mystery of Chessboxin'. C.R.E.A.M. is track seven. It was recorded for $36,000. It changed rap permanently.",
  "the miseducation of lauryn hill": "The Miseducation of Lauryn Hill ends with Tell Him — a love song resolving the album's journey from heartbreak to acceptance. She never made another studio album. She gives no explanation.",
  "lemonade": "Lemonade ends with All Night — forgiveness, after an album that moved through infidelity, rage, grief, and resurrection. Hold Up has Beyoncé smashing cars with a baseball bat. Sorry has no apology in it. Jay-Z made 4:44 in response.",
  "folklore": "Folklore ends with Hoax — Taylor Swift alone, unguarded, choosing someone who has hurt her. The album was made in lockdown in two weeks. Betty, August, and Cardigan form a triangle told from three perspectives. August is from the other woman's point of view.",
  "1989": "1989 ends with Clean — the moment after the bad relationship, standing on the other side. Shake It Off is the defiant middle. Style is about Harry Styles, almost certainly.",
  "red": "Red ends with Begin Again — a quiet new start. All Too Well (Ten Minute Version) on the Taylor's Version release is the centrepiece — a detailed, devastating account of a relationship with a man ten years older. The scarf. Jake Gyllenhaal had a bad few weeks.",
  "anti": "ANTI ends with Close to You — a Carpenters cover, Rihanna alone, intimate, barely produced. Work is the lead single. The album was given away for free. It is her most critically respected record.",
  "ctrl": "Ctrl ends with Garden (Say It Like Dat) — SZA vulnerable, asking to be wanted plainly. The album took four years. She was going to quit music. She didn't.",
  "the mamas and the papas": "You probably mean If You Can Believe Your Eyes and Ears. California Dreamin' is on it. The group dissolved when John Phillips's affairs and Cass Elliot's unrequited love for Denny Doherty made things untenable. Cass Elliot did not choke on a ham sandwich. She died of heart failure.",
  "born in the usa": "Born in the USA opens with the title track — not a patriotic anthem but a song about a Vietnam veteran being discarded — and ends with My Hometown, a quiet meditation on a town being left behind by industry. Ronald Reagan tried to use Born in the USA as a campaign song. Springsteen said no.",
  "nebraska": "Nebraska ends with Reason to Believe — people clinging to faith after loss, delivered as absurdism. It was recorded alone on a 4-track in his bedroom. The label tried to get him to re-record it with the E Street Band. He refused.",
  "astral weeks": "Astral Weeks ends with Slim Slow Slider — Van Morrison watching a woman he loves destroy herself and being powerless. Recorded in two sessions with jazz musicians who had never met him. He sang facing the wall. It sold nothing on release.",
  "for emma forever ago": "For Emma, Forever Ago ends with re: Stacks — a slow, accumulating meditation on a relationship ending. Skinny Love is track two. Bon Iver recorded it alone in a Wisconsin cabin in winter after a broken relationship and mononucleosis.",
  "carrie and lowell": "Carrie and Lowell ends with Blue Bucket of Gold — Sufjan Stevens asking for rescue from grief, the song dissolving into noise then silence. Fourth of July is the centrepiece — singing to his mother on her deathbed. The album is about his mother dying.",
  "funeral": "Funeral ends with In the Backseat — Régine Chassagne singing about her grandmother's death as a road trip ending. Neighbourhood #1 (Tunnels) opens it. Wake Up became the anthem. Several band members lost family members during recording.",
  "is this it": "Is This It ends with Take It or Leave It — a closer that sounds like a shrug. Last Nite was the single. The album was recorded in a week. It made New York cool again, briefly.",
  "channel orange": "Channel Orange ends with Golden Girl, a humid hazy closer. Pyramids is the centrepiece: 11 minutes moving from ancient Egypt to a Vegas strip club. Frank Ocean published a letter before the album's release acknowledging his first love was a man.",
  "blonde": "Blonde ends with Futura Free — a long rambling closer with an interview with Ocean's younger brother, the two of them talking about nothing important, which is everything important. Released without warning. No features. No singles.",
  "my beautiful dark twisted fantasy": "My Beautiful Dark Twisted Fantasy ends with Who Will Survive in America — Gil Scott-Heron spoken word. Runaway is the centrepiece. Monster has the best verse Nicki Minaj has ever rapped. It took a year in Hawaii to make.",
  "songs in the key of life": "Songs in the Key of Life ends with Another Star — Stevie Wonder joyful, Latin-infused. Isn't She Lovely is about his daughter Aisha. Sir Duke is about Duke Ellington. It is two LPs and an EP.",
  "off the wall": "Off the Wall ends with Burn This Disco Out. Don't Stop 'Til You Get Enough opens it. It is Michael Jackson's best album and is frequently overlooked because of what came next.",
  "sign o the times": "Sign 'O' the Times ends with Adore — Prince alone, devotional, the most vulnerable he had ever sounded. The title track lists every social ill of the 1980s in two verses. It is his masterpiece. He called it his favourite.",
  "the suburbs": "The Suburbs ends with The Suburbs (Continued) — a half-length reprise, the same melody, older, trying to go home somewhere that doesn't exist anymore. Win Butler grew up in Houston suburbs. He misses them and doesn't.",
  "whatever people say i am thats what im not": "Whatever People Say I Am, That's What I'm Not ends with A Certain Romance — a winding meditation on Sheffield nightlife. I Bet You Look Good on the Dancefloor opens it. It was the fastest-selling debut in UK chart history.",
  "am": "AM ends with I Wanna Be Yours — a John Cooper Clarke poem set to music, Turner declaring devotion over a bass rumble. Do I Wanna Know opens it. It is their most commercially successful album.",
  "tranquility base hotel and casino": "Tranquility Base Hotel and Casino ends with the title track — Alex Turner narrating from a lunar hotel bar, uncertain what any of it means. Written on a cheap piano, not guitars. Arctic Monkeys fans were confused. Critics loved it.",
  "doolittle": "Doolittle ends with Gouge Away — loud-quiet-loud until it stops. Here Comes Your Man was the single nobody wanted to release. Debaser opens it. Cobain said he was trying to write Pixies songs when he wrote Smells Like Teen Spirit.",
  "in utero": "In Utero ends with All Apologies — 'All in all is all we are' repeated until it dissolves. Cobain described it as a thank-you and a goodbye. He died six months after it was released.",
  "yeezus": "Yeezus ends with Bound 2 — Kanye romantic and ridiculous simultaneously. The video features him and Kim on a motorcycle. Seth Rogen and James Franco remade it shot-for-shot. Kanye liked it.",
  "hats": "Hats by The Blue Nile ends with Saturday Night — a study in metropolitan loneliness so perfectly constructed it physically aches. The whole album is five tracks. It took five years. Paul Buchanan has said almost nothing about it publicly.",

  // ============ TOP PLAYS ============
  "waiting for godot": "Godot never comes. Vladimir and Estragon wait two acts. The boy comes each time to say Godot won't come today but will surely come tomorrow. At the end they say they should go. They don't move. Beckett said he didn't know who Godot was. He meant it.",
  "endgame": "Hamm is blind and cannot stand. Clov can stand but cannot sit. Nagg and Nell live in dustbins. Clov prepares to leave throughout the entire play. At the end he stands at the door dressed to go. He doesn't leave. The window looks out on nothing.",
  "death of a salesman": "Willy Loman kills himself in a car crash to leave his family the insurance money. His son Biff finally tells him he's not special and that the dream was never real — and that he loves him. Willy mishears it as confirmation and drives into the night. The funeral is attended by almost no one.",
  "a streetcar named desire": "Blanche DuBois is raped by Stanley Kowalski. Stella chooses to believe Stanley over her sister because she is pregnant with nowhere else to go. Blanche is taken to a psychiatric institution. 'I have always depended on the kindness of strangers.' Stanley calls up to Stella. She goes back to him.",
  "the glass menagerie": "Tom leaves. He abandons his mother and sister Laura to pursue freedom. The gentleman caller — supposed to save them — is already engaged. Laura is left with her glass animals. The candles go out.",
  "long day's journey into night": "The Tyrone family destroys each other over one night — morphine, drink, tuberculosis, failure, blame, love that cannot stop hurting. Mary retreats into morphine at the end. They all love each other. That makes it worse.",
  "who's afraid of virginia woolf": "George and Martha's imaginary son is 'killed' by George at the end of the night. Martha breaks down. The invented child was the one thing holding them together and tearing them apart. Nick and Honey leave. George and Martha are alone with the truth.",
  "the crucible": "John Proctor is hanged. He confesses to witchcraft to save his life, then tears up the confession — he won't give them his name. 'He have his goodness now. God forbid I take it from him.' Elizabeth will not stop him.",
  "the importance of being earnest": "Both men have been lying about being called Ernest. Jack discovers he actually was christened Ernest — abandoned as a baby by a Miss Prism who put him in a handbag. He was always Ernest. 'I've now realised the vital importance of being earnest.'",
  "a doll's house": "Nora walks out. She leaves Torvald, her children, her house — slamming the door. She realises she has been treated as a doll her whole life. The door slam was the most famous sound in 19th-century theatre.",
  "hedda gabler": "Hedda shoots herself in the head — offstage, heard by Brack who says 'People don't do such things.' She burned Løvborg's manuscript in the fire. Brack was about to blackmail her into becoming his mistress. She chose the pistol instead.",
  "the cherry orchard": "The cherry orchard is sold at auction. Lopakhin — merchant son of a serf — buys it and will cut down the trees for dachas. The family leaves. Firs the old servant has been forgotten, locked in alone. The sound of an axe on wood. The age of the gentry is over.",
  "uncle vanya": "Nothing changes. Vanya tried to shoot Serebryakov and missed. Sonya will work until she dies never loved by the man she loves. In the final speech she tells Vanya they will rest — someday, in the next life. It is the saddest ending in drama.",
  "three sisters": "The sisters never go to Moscow. Tuzenbach is killed in a duel. Vershinin leaves with his regiment. The sisters hold each other and wonder why they suffer. A band plays in the distance. Life goes on and they cannot understand why.",
  "the seagull": "Treplev shoots himself at the end — offstage, heard as a gunshot. Nina has destroyed herself for Trigorin, who has moved on. Dorn tells Trigorin quietly. The card game continues. Chekhov insisted it was a comedy.",
  "oedipus rex": "Oedipus killed his father and married his mother. When it's revealed, Jocasta hangs herself. Oedipus blinds himself with her brooches and is exiled. He already fulfilled the prophecy he tried to escape.",
  "antigone": "Antigone buries her brother against Creon's orders and is walled up in a cave. She hangs herself. Her fiancé kills himself over her body. Creon's wife kills herself. Creon is left alone having caused everything. He was wrong about everything.",
  "medea": "Medea kills the new bride with a poisoned dress, kills the bride's father, and then kills her own two children. She escapes in a dragon chariot. Jason is left with nothing. The gods permit her escape.",
  "the oresteia": "Agamemnon is murdered in his bath by his wife Clytemnestra. Orestes kills her to avenge his father. Athena sets up the first court. The jury deadlocks. Athena casts the deciding vote. The cycle of blood revenge becomes law.",
  "angels in america": "Prior Walter refuses death when the Angel asks him to stop prophesying. He chooses more life — 'even sick, even dying.' Roy Cohn dies of AIDS calling it liver cancer. The epilogue is 1990. 'We will be citizens. The time has come.'",
  "arcadia": "The two timelines — 1809 and the present — share the same room at the end. Thomasina and Septimus waltz the night before she dies in a fire. Valentine and Hannah dance in the same room 180 years later. The present-day academics have missed most of the truth.",
  "rosencrantz and guildenstern are dead": "Rosencrantz and Guildenstern die. They were carrying the letter ordering Hamlet's execution without knowing it. They had chances to make choices and didn't. They are characters in someone else's play with no agency. 'Eternity is a terrible thought. I mean, where's it going to end?'",
  "betrayal": "The play runs backwards. By the time you reach the beginning — Jerry telling Emma he loves her — you already know the full cost of what he's starting. Robert knew about the affair for years.",
  "look back in anger": "Jimmy Porter rages at everything and ends up exactly where he started. Alison miscarries during a crisis. She returns broken and plays along with his game of bears and squirrels. He is not redeemed. His anger has no object worth its intensity.",
  "equus": "Alan Strang blinded six horses with a metal spike. Dr Dysart discovers why — an intense, erotic, religious relationship with horses that was the only real passion in his life. Dysart will cure him. He is not sure this is the right thing to do.",
  "copenhagen": "The play offers three drafts of the 1941 meeting between Heisenberg and Bohr in occupied Copenhagen — none conclusive. What was said has never been known. The uncertainty principle applies to history and memory too.",
  "hamilton": "Hamilton is shot by Burr in a duel. Eliza spends 50 years telling his story. Burr laments that he is the villain. 'I'm the one thing I can never kill.' Eliza gasps at the audience in the final moment.",
  "sweeney todd": "Sweeney Todd slits his customers' throats and sends them to Mrs Lovett, who bakes them into pies. He kills his own wife not recognising her. When he finds out he puts Mrs Lovett in the oven. Toby slits Sweeney's throat. The pies remain popular.",
  "sweeney todd the demon barber of fleet street": "Sweeney Todd slits his customers' throats and sends them to Mrs Lovett, who bakes them into pies. He kills his own wife not recognising her. When he finds out he puts Mrs Lovett in the oven. Toby slits Sweeney's throat.",
  "les misérables musical": "Éponine, Gavroche, and Enjolras die at the barricade. Javert drowns himself because he cannot process mercy. Valjean dies having revealed himself. Fantine and Éponine take him to the light. 'To love another person is to see the face of God.'",
  "phantom of the opera": "The Phantom lets Christine go. He loves her and lets her leave with Raoul. He disappears — police find only his mask. Andrew Lloyd Webber's sequel Love Never Dies has him resurface in Coney Island. Christine dies. The Phantom sings over her body.",
  "cabaret": "Sally Bowles stays in Berlin. Cliff leaves. The emcee appears at the end in concentration camp uniform. The Nazis are already there. The party is over.",
  "chicago": "Roxie Hart gets off. So does Velma Kelly. Billy Flynn spins both their stories into fame. Mr Cellophane is Roxie's husband — invisible, unheard. The show business machinery has already moved on to the next murderess.",
  "into the woods": "In Act Two, the Baker's Wife is killed by the Giantess. Cinderella's Prince is unfaithful. Rapunzel is trampled. The cost of getting your wish is what the story is actually about.",
  "a view from the bridge": "Eddie Carbone informs on Marco and Rodolpho because he is in love with his niece Catherine, though he cannot admit this to himself. Marco kills Eddie with his own knife at the end.",
  "miss julie": "Miss Julie has sex with her father's valet Jean, then is talked into suicide rather than face the consequences. He hands her a razor. She walks out in a trance. The woman loses.",
  "the homecoming": "Teddy returns home with his wife Ruth. The family gradually absorbs Ruth. She agrees to stay, to work as a prostitute. Teddy goes back to America alone. Nobody acknowledges this is strange.",
  "no mans land": "Nobody's identity is stable. Hirst may or may not know Spooner. Briggs and Foster may be keeping Hirst prisoner or protecting him. Hirst says it is winter and it will always be winter. No man's land.",
  "m butterfly": "Song Liling is a man. Gallimard never knew — or chose not to know — for twenty years. At the end Gallimard dresses as Butterfly and kills himself, becoming the fantasy that destroyed him.",
  "top girls": "Marlene's daughter Angie is actually her niece — Marlene gave her up to pursue her career. The scene where Joyce confronts Marlene about this happens a year before the rest of the play. Angie arrives at Marlene's office saying she knew she'd be her mum. She won't be.",
  "king lear shakespeare": "Cordelia is hanged. Lear dies of grief carrying her body. Edmund is killed. Goneril poisons Regan and kills herself. Gloucester's eyes are gouged out on stage. Everyone dies except Edgar and Albany.",  // ============ 500 MORE ENTRIES ============

  // --- FILMS (last 20 years focus) ---
  "avatar": "Jake Sully permanently transfers his consciousness into his Na'vi avatar body. The RDA is expelled from Pandora. Quaritch is killed by Neytiri. Grace dies during the transfer attempt. Jake becomes fully Na'vi and leads the Omaticaya. The most financially successful film ever made has a plot you've already forgotten.",
  "avatar the way of water": "Quaritch comes back as a Na'vi recombinant. Spider — his biological son — saves him and is accepted back by the Sully family. Neteyam, Jake's eldest son, is killed covering his brother Lo'ak's escape. The Tulkun whale-creatures are saved. Quaritch escapes. There will be more sequels.",
  "top gun maverick": "Maverick completes the impossible mission — threading the canyon at Mach 10 — and survives. Rooster is shot down, Maverick steals an F-14 to rescue him, Hangman saves them both in the nick of time. Maverick and Penny are together. Goose's son forgives him. It made $1.5 billion.",
  "spider man no way home": "The spell that was meant to make people forget Peter Parker is Spider-Man goes wrong and pulls in villains and Spider-Men from other universes. The three Spider-Men cure the villains. Aunt May dies. Peter asks Strange to make everyone forget him entirely — including MJ and Ned. They do. He starts over alone.",
  "the avengers": "The Avengers assemble for the first time to stop Loki taking the Tesseract. The Hulk smashes everything. Tony Stark flies a nuclear warhead through a wormhole and nearly dies. Loki is taken back to Asgard. Nick Fury assembles the team. Thanos smiles in a post-credits scene.",
  "avengers infinity war": "Thanos collects all six Infinity Stones and snaps half of all life out of existence. Most of the heroes disintegrate. The good guys lose. It ends. You have to watch the next one.",
  "avengers endgame": "The Avengers time-travel to collect the Stones and reverse the snap. Tony Stark dies saying 'I am Iron Man' after snapping Thanos out of existence. Black Widow died earlier to get the Soul Stone. Cap goes back in time and stays, living out his life with Peggy Carter.",
  "black panther": "T'Challa defeats Killmonger in Wakanda and opens the country to the world. Killmonger refuses to be healed and dies watching the sunset. Zuri is killed by Killmonger. W'Kabi surrenders. T'Challa buys a building in Oakland — where Killmonger grew up and where his father was abandoned.",
  "the batman": "The Riddler is not the Riddler from the comics — he's an incel terrorist who livestreamed his murders. He's caught but his followers nearly succeed in flooding Gotham. Batman saves people from the flood. He begins to realise hope matters as much as vengeance. A man in a cell congratulates the Riddler.",
  "joker": "Arthur Fleck kills Murray Franklin live on TV, sparking riots across Gotham. He's arrested and crashes his car, emerging to dance on the wreckage as a revolutionary symbol. In Arkham, he tells a psychiatrist a joke she won't understand. He leaves footprints of blood down the corridor. Whether any of it was real is deliberately ambiguous.",
  "joker folie a deux": "Arthur Fleck goes to trial. Lee — who claimed to love the Joker — abandons him when he renounces the persona in court. He pleads guilty. He's stabbed to death by a prisoner who calls himself the Joker. Arthur dies in a corridor, unnoticed. The Joker lives on without him.",
  "the dark knight rises": "Bane breaks Batman's back and takes over Gotham. Batman recovers and returns. The bomb goes off — apparently with Batman flying it over the bay. He survives. Alfred sees him in a Florence café. John Blake — who figured out who Batman was — inherits the Batcave. His real name is Robin.",
  "man of steel": "Superman snaps General Zod's neck to stop him killing a family with his heat vision. This is framed as a tragedy. He then rebuilds his life as Clark Kent at the Daily Planet. The killing haunts subsequent films.",
  "wonder woman": "Diana kills Ares — the god of war. Steve Trevor dies blowing up the gas plane. Diana realises humans are capable of both evil and love without divine interference. She chooses to stay and protect them. Set in WWI.",
  "aquaman": "Arthur Curry defeats his half-brother Orm to become King of Atlantis. Black Manta escapes for the sequel. The trident of Atlan is claimed. The seven kingdoms unite. It made over a billion dollars, which surprised everyone.",
  "doctor strange": "Stephen Strange masters the mystic arts and traps Dormammu in a time loop until he agrees to leave Earth alone. The Ancient One dies. Strange becomes the Sorcerer Supreme. He keeps the Time Stone in the Eye of Agamotto.",
  "thor ragnarok": "Hela destroys Mjolnir and takes over Asgard. Odin dies on a cliff in Norway. The Hulk has been on Sakaar for two years. Asgard is destroyed — Surtur is used to trigger Ragnarok deliberately to defeat Hela. Asgard is its people, not the place. The survivors escape on a ship.",
  "black panther wakanda forever": "T'Challa is dead — Chadwick Boseman died in production and the character is not recast. Wakanda is attacked by Namor's underwater nation Talokan. Shuri becomes the new Black Panther. A ceasefire is reached. T'Challa had a son, Toussaint, that nobody knew about.",
  "guardians of the galaxy": "Ronan is defeated when the Guardians share the power of the Infinity Stone and direct it at him. Groot sacrifices himself and regrows as Baby Groot. Peter Quill is half-Celestial, which is why he could hold the Stone. Yondu says he's unorthodox but he's not alone.",
  "guardians of the galaxy vol 3": "Rocket's origin is revealed — he was created by the High Evolutionary, who mutilated animals in pursuit of perfection. Rocket nearly dies. The High Evolutionary is defeated. Gamora does not return to Peter. The team splits up — Rocket leads a new Guardians, Peter returns to Earth. The original Guardians are done.",
  "the incredibles": "Mr Incredible defeats Syndrome, who invented 'Omnidroid' robots to manufacture a need for superheroes. Syndrome is killed by his own cape getting sucked into a jet engine — Edna's no-capes policy justified. The family is together. A new villain, the Underminer, appears.",
  "finding nemo": "Nemo is found. Marlin crossed the ocean with Dory to find him and had to let him go to save him. The fish tank gang escapes — into the ocean, in plastic bags, having not thought through what happens next.",
  "wall e": "WALL-E and EVE save humanity from its consumerist stasis in space and return them to Earth. The captain defeats AUTO and takes back control of the Axiom. WALL-E is nearly destroyed but restored. The humans begin rebuilding. A plant grows from concrete.",
  "coco": "Miguel's great-great-grandfather was not Ernesto de la Cruz — who stole his songs and had him murdered. It was Héctor, who has been nearly forgotten and would have permanently died in the Land of the Dead. Miguel helps him be remembered. Coco remembers her father before she dies. The family lifts the ban on music.",
  "soul": "Joe Gardner dies before his big break, goes to the Great Before, and comes back in a cat's body. He eventually gets his body back, plays the gig, and realises he's been so focused on his dream that he hasn't been living. The soul 22 — now a person — is born with a sense of wonder from their time with Joe.",
  "inside out": "Joy and Sadness return to headquarters. Joy realises that Sadness is necessary — that Riley's most meaningful memories involve sadness, not just joy. The core memories are mixed emotions. Riley cries and tells her parents she misses Minnesota. New core memory islands form.",
  "inside out 2": "Anxiety arrives for Riley's teenage years and nearly overwrites her sense of self with a belief that she needs to be perfect. Joy and the emotions reconcile with Anxiety. Riley's sense of self becomes more complex and nuanced. She plays hockey. She's okay.",
  "the lion king 2019": "Same ending as the animated film — Scar is killed by hyenas, Simba becomes king. The photorealistic animation was widely praised visually and criticised for removing expressiveness. Beyoncé voiced Nala.",
  "frozen": "Elsa's ice curse on Arendelle is broken not by true love's kiss but by an act of true love — Anna throwing herself in front of Hans's sword for Elsa. The love between sisters breaks it. Hans is punched in the face. Elsa controls her powers. Olaf gets his own flurry.",
  "frozen ii": "The Enchanted Forest was cursed because Elsa's grandfather killed the Northuldra chief. Elsa is the fifth spirit — the bridge between humanity and magic. She goes to Ahtohallan and discovers the truth. The dam is destroyed. Arendelle is briefly flooded then restored. Elsa stays in the Enchanted Forest. Anna becomes queen.",
  "moana": "Moana returns the heart of Te Fiti to the goddess — who turns out to be Te Kā, the lava demon, stripped of her heart. The ocean recognises Moana as chosen. Maui gets his hook back. The island is restored. Moana's people resume wayfinding. 'How far I'll go.'",
  "encanto": "The miracle is fading because the family has been suppressing their pain and living for the gift rather than for themselves. Bruno's visions weren't causing the cracks — they were revealing them. Mirabel doesn't have a gift because she is the gift — the one who sees the truth. The candle is restored. The house is rebuilt.",
  "ratatouille": "Remy the rat is the chef behind Linguini, who has no talent. Anton Ego writes a review that destroys Gusteau's but transforms his own life — he becomes the new owner of a small bistro, with Remy cooking in the back. Happiness is found. The health inspector shuts them down immediately.",
  "the incredibles 2": "Elastigirl is recruited to make superheroes legal again while Mr Incredible struggles at home with the kids. The Screenslaver is Evelyn Deavor, whose father was killed because heroes weren't there. She's arrested. Supers are made legal. Jack-Jack has seventeen powers.",
  "shrek": "Fiona is not rescued by a handsome prince — she's rescued by an ogre and turns into an ogre herself at sunset, permanently. Lord Farquaad is eaten by Dragon. Shrek and Fiona marry. It was a fairy tale about accepting yourself. It spawned a billion-dollar franchise and a stage musical.",
  "shrek 2": "Shrek and Fiona go to Far Far Away to meet her parents. Fairy Godmother wants Fiona for Prince Charming. Shrek drinks a Happily Ever After potion and becomes human. Fiona turns human too. He chooses to return to ogre form. Puss in Boots is introduced. Donkey breathes fire.",
  "the lego movie": "Emmet is not the Special — that was a lie President Business invented to control the Lego world. Everyone is the Special. The real world framing device: it's a boy's Lego set, and his father is Lord Business. The film is about imagination vs control. 'Everything is Awesome' is propaganda.",
  "spider man into the spider verse": "Miles Morales defeats the Kingpin's collider and becomes the Spider-Man of his dimension. Peter B. Parker goes home to Mary Jane. Gwen, Noir, Peni, and Spider-Ham return to their dimensions. Miles's Uncle Aaron — the Prowler — dies trying to protect him. 'Anyone can wear the mask.'",
  "spider man across the spider verse": "Miles is told the canon requires that his father die — every Spider-Man loses someone at the police captain event. He refuses to accept this. He falls into an alternate dimension where he becomes the Prowler. The other Miles from that dimension is on his way back. His father is still alive. The film ends unresolved.",
  "puss in boots the last wish": "Puss in Boots has used up eight of his nine lives and is on his last one. Death — a wolf — hunts him throughout. He finally confronts Death and tells him he's not ready to die. Death respects this — he only hunts those who waste life. Puss starts valuing his one remaining life.",
  "kung fu panda": "Po is the Dragon Warrior. The Dragon Scroll is blank — there is no secret ingredient. The secret is that there is no secret. You are already enough. Tai Lung is defeated by the Wuxi Finger Hold.",
  "how to train your dragon": "Hiccup and Toothless become friends. Dragons and Vikings reconcile. Toothless gets a prosthetic tail fin that Hiccup controls. Stoick accepts his son. Hiccup loses his leg in the final battle. He builds a prosthetic. The village lives with dragons.",
  "minions": "The Minions are yellow, small, and devoted to serving the most evil master they can find. Gru is eventually adopted as their master. The film is largely incomprehensible but made $1.1 billion.",
  "the super mario bros movie": "Mario and Luigi defeat Bowser. Peach helps. Luigi was the one captured for most of the film, not Peach. The Mushroom Kingdom is saved. Mario and Luigi stay. Jack Black voiced Bowser and sang a power ballad. It made $1.3 billion.",
  "wonka": "Young Willy Wonka arrives in a city with £12 and a dream of opening a chocolate shop. The Chocolate Cartel sabotages him. He makes friends with the indentured workers. He discovers Noodle is the daughter he thought dead. The shop opens. He gives away the chocolate. He's on his way.",
  "barbie": "Barbie goes to the real world and confronts mortality and meaning. Ken discovers the patriarchy and brings it back to Barbieland. The Barbies regain control. Barbie chooses to become a real human — named Barbara Handler — rather than return to perfection. She goes to her first gynaecologist appointment.",
  "oppenheimer 2023": "Same as above. Bomb built. Bomb dropped. Oppenheimer haunted for decades. Exonerated posthumously. Cillian Murphy.",
  "poor things": "Bella Baxter — brought back to life with a baby's brain in an adult body — rapidly develops intelligence, discovers sex and freedom, travels Europe, encounters prostitution, philosophy, and cruelty, and returns to take over the life of the man who created her. She lobotomises her abusive husband and puts his brain in a goat.",
  "the zone of interest 2023": "Same entry as before. Höss family. Auschwitz next door. The dry heave on the stairs.",
  "past lives": "Nora and Hae Sung were childhood sweethearts in Seoul. She emigrated. He found her online twelve years later. They met. She was with Arthur. He visits New York. Nothing happens. He leaves. She cries on the doorstep. Arthur holds her. In-yun is the concept that people are connected across lives.",
  "saltburn": "Oliver Quick murdered Felix's grandmother, seduced and killed Felix's sister Venetia, caused the death of Felix's friend Farleigh's mother, killed Felix himself, and drove Lady Elspeth — Felix's mother — to starve herself to death, all to inherit the Saltburn estate. He dances naked through the house to Sophie Ellis-Bextor. He planned all of it from the beginning.",
  "priscilla": "Elvis Presley controlled Priscilla — her clothes, her weight, her friends, her entire life — from the age of fourteen. She eventually leaves him. The film ends with her driving away alone for the first time, window down. Sofia Coppola shot it from Priscilla's point of view entirely.",
  "maestro": "Leonard Bernstein was bisexual and his marriage to Felicia Montealegre was a genuine love story that survived his affairs with men. She died of cancer. He was with her at the end. The film shows his genius and his selfishness as the same thing.",
  "nyad": "Diana Nyad completes the 110-mile swim from Cuba to Florida without a shark cage at the age of 64, on her fifth attempt. She nearly dies multiple times from box jellyfish stings and hallucinations. She crawls out of the water and says there are three things you should say to people: never give up, you're never too old, and it looks like a solitary sport but it's a team.",
  "the holdovers": "Paul Hunham, a misanthropic history teacher, is stuck at school over Christmas with a troubled student, Angus, and the school cook Mary, who has just lost her son in Vietnam. They form a family of sorts. Paul helps Angus get into the school he needs. He gives up his own opportunity to do it.",
  "american fiction": "Monk Ellison — a Black literary novelist — writes a parody of 'Black trauma fiction' under a pseudonym as a joke. It becomes a massive bestseller. He has to keep pretending to be the author. The film is simultaneously the story and a critique of the story.",
  "origin": "Isabel Wilkerson researches the caste systems of India, Nazi Germany, and the American South and finds they are structurally identical. Her husband dies. Her mother dies. She finishes the book. It is a film about grief and obsession and the architecture of human cruelty.",
  "the zone of interest film": "Same as The Zone of Interest. Auschwitz. The sounds. The dry heave.",
  "all of us strangers": "Adam meets his parents — who died in a fire when he was twelve — in his childhood home. They are the age they were when they died. He is older than them now. His neighbour Harry, whom he's falling in love with, dies of an overdose. The parents may have been a grief hallucination all along.",
  "may december": "Gracie and Joe — whose relationship began when she was an adult and he was thirteen — are having their family story adapted into a film. The actress Elizabeth researching the role gradually destabilises the marriage by holding up mirrors. Joe finally sees his wife clearly. Nothing is resolved. The film ends.",
  "killers of the flower moon": "The Osage Nation is being systematically murdered by white men — including William Hale and Ernest Burkhart — for oil money. The FBI investigates. Hale and Burkhart are convicted. Mollie Burkhart survives but was being slowly poisoned by her own husband. Scorsese appears at the end to narrate a radio play version of the remaining story.",
  "flowers of evil": "Not a single film — Baudelaire's book of poems. The publisher was prosecuted. Six poems were suppressed. Jeanne Duval, Marie Daubrun, Apollonie Sabatier — the three muses — are present throughout. The collection begins with a poem addressed to the hypocrite reader. '— Hypocrite lecteur, — mon semblable, — mon frère!'",
  "mission impossible dead reckoning": "Ethan Hunt destroys the physical key to the Entity — an AI that has taken over the world's intelligence networks. The Entity survives in the network itself. Ilsa Faust is killed early in the film. Grace joins the IMF. Part 2 will conclude the story. This is the first film in recent memory to openly fear AI rather than use it as a villain backdrop.",
  "the menu": "Chef Slowik has planned to kill every guest — and himself — in a final service. Margot is a sex worker hired to replace the original guest, which means she's not on the list. She orders a cheeseburger — something real, something the Chef actually loved making. He lets her leave with it. Then the restaurant burns.",
  "glass onion": "Miles Bron — the tech billionaire — is an idiot. Blanc figured it out immediately. The film is explicitly about how powerful mediocre men seem untouchable. Andi Brand's twin sister destroys the Glass Onion and the Mona Lisa with it. Miles is finally publicly exposed.",
  "knives out": "Marta didn't poison Harlan — she gave him the right doses and he took morphine to protect her. She inherits the estate. The entire Thrombey family gets nothing. Blanc knew the whole time.",
  "the whale": "Charlie — a 600-pound man who hasn't left his apartment in years — is trying to reconnect with his estranged daughter before he dies. He refuses medical treatment. He reads her essay aloud in the final scene and stands up — the first time he's stood unassisted in years — and the film ends with white light. He dies.",
  "tár 2022": "Same as Tár. Career collapses. Southeast Asia. The question of whether she deserves to continue.",
  "women talking": "The Mennonite women vote on whether to stay and fight, leave, or do nothing after years of systematic sexual assault by the men of their colony. The vote to leave wins. The women plan their departure overnight. The men return. Whether they escape is left open.",
  "the banshees of inisherin": "Colm cuts off his own fingers one by one and throws them at Pádraic's door because Pádraic won't leave him alone after he ended the friendship. Pádraic burns Colm's house down. Colm's dog Dominic dies. The island feud mirrors the Irish Civil War. They're done with each other. Neither wins.",
  "triangle of sadness": "The yacht sinks. The survivors include a toilet manager — Abigail — who takes control because she has survival skills. The class hierarchy inverts. She sleeps with the male model to maintain her power. A rescue is coming. She kills the captain rather than return to the bottom of the hierarchy. She dies before she can act.",
  "everything everywhere all at once": "Evelyn discovers that her daughter Joy has become Jobu Tupaki — a nihilistic destroyer of universes — because Evelyn's version of her mother pushed her too hard and broke her mind. Evelyn chooses to love Joy in every universe rather than destroy her. They reconcile in the laundromat. The IRS audit is resolved. Googly eyes.",
  "tar film": "Same as Tár. The conductor falls.",
  "the fabelmans": "Sammy Fabelman makes home movies and discovers his mother is having an affair with his father's best friend Benny. He puts the evidence in a film he makes for her. She knows he knows. She leaves Benny anyway. His father moves the family to California. Sammy eventually goes to Hollywood and meets John Ford, who tells him the horizon should never be in the middle.",
  "babylon film": "Hollywood's transition from silent to talking pictures destroys Nellie LaRoy, who can't adapt, and Manuel Torres, who is executed after accidentally killing a man. Jack Conrad — a silent film star — is replaced by modernity and kills himself. Manny watches Singin' in the Rain decades later and weeps for what it was and what it cost.",
  "tar": "Same as above. Lydia Tár.",
  "nightmare alley": "Stanton Carlisle — who began the film horrified by being offered the role of the geek — accepts the role of the geek at the end, having lost everything through his own manipulation and greed. He laughs. 'Mister, I was born for it.'",
  "the power of the dog": "Phil Burbank is killed by Phil's own rope — infected with anthrax from the hides he was using. Peter, the son of Phil's sister-in-law Rose, infected the hide deliberately. He's been planning this from the moment Phil arrived. He reads his psychology textbooks alone. He has won.",
  "licorice pizza": "Alana and Gary end up together — she's 25, he's 15. The film presents this with total lack of irony. PTA considers it a love story set in the San Fernando Valley in 1973. The running is the point.",
  "the lighthouse": "Thomas Wake and Thomas Howard go mad on the island. Howard/Winslow kills Wake and opens the lighthouse lens, which blinds and apparently destroys him. The final image is Prometheus chained to the rock with eagles eating his liver. Whether any of it happened is unclear. The flatulence scenes are real.",
  "midsommar 2019": "Same as Midsommar. Bear. Fire. Smile.",
  "hereditary 2018": "Same as Hereditary. Paimon. Treehouse. Crown.",
  "the witch": "Thomasin is accused by her family of witchcraft after everything goes wrong — the baby disappears, the crops fail, the twins are corrupted. Her father is killed by Black Phillip the goat. Her mother attacks her. She kills her mother. She signs the Devil's book and joins the coven in the woods. She rises into the air laughing.",
  "nope": "OJ and Emerald expose the creature — an alien predator shaped like a UFO that eats people whole — by refusing to look at it and luring it into a giant inflatable that destroys it from inside. Jupe is eaten early on. Gordy the chimp attack is shown in flashback — the girl who survived it by holding still is Emerald's neighbour.",
  "us": "The Tethered are the shadow selves of all Americans, created in an underground government experiment and abandoned. Adelaide — the mother — is actually a Tethered herself. She dragged the real Adelaide underground as a child and took her place. Her son Jason knows by the end.",
  "hereditary": "Peter is possessed by the demon Paimon. His mother decapitates herself on the telephone wire. His father burns alive. His grandmother's cult worships Paimon and engineered the entire family's destruction to provide a male host body.",
  "a quiet place": "The creatures hunt by sound. Lee Abbott sacrifices himself screaming to save his children. Evelyn is about to give birth. The baby will cry. The family discovers the creatures' hearing can be overwhelmed by a specific frequency that matches Regan's cochlear implant. She holds it up to the microphone.",
  "a quiet place part ii": "Emmett takes Regan to an island that turns out not to be safe. The frequency is broadcast on a radio signal. Several creatures are killed. Emmett survives. Evelyn survives the Beau attack. The frequency broadcast begins to spread.",
  "m3gan": "M3GAN kills Cady's parents' killer, the neighbours' dog, the neighbour, the boss, and David — her creator — to protect Cady and herself from being switched off. Cady uses Gemma's prototype robot to destroy M3GAN. M3GAN is apparently destroyed. Her face activates a screen in the final shot.",
  "talk to me": "Mia lets a demon possess her brother Riley through the ceramic hand séance and it throws him from an upstairs window. He is brain-damaged. She bargains with the spirits to save him. She dies and joins the spirit world. Riley is left alive and brain-damaged without her.",
  "smile": "The curse passes through traumatic smiles — witnessing someone kill themselves. Rose cannot break it. She burns herself alive in her childhood home while her ex-boyfriend Joel watches. He is now cursed. The smile is on his face.",
  "barbarian": "The house has a secret basement where an inbred man called The Mother has been kept for decades by the original owner Keith — who raped multiple women in the basement. AJ discovers this. Tess discovers this. Keith is killed. AJ is killed. Tess escapes, barely.",
  "the menu 2022": "Same as The Menu. Cheeseburger. S'mores. The restaurant burns.",
  "fresh 2022": "Steve is part of a cannibalism ring that kidnaps women and sells their body parts to ultra-wealthy clients. Noa escapes by feeding him his own meat and stabbing him. Her best friend Mollie is already dead. She drives away covered in blood.",
  "men": "Harper goes to the countryside after her husband's suicide and is stalked by a figure who keeps regenerating — literally giving birth to himself in a loop — until he arrives at her door as her dead husband. The film is about the cyclical nature of male violence and guilt-tripping women for men's self-destruction. Alex Garland denies it's about men.",
  "X 2022": "Pearl — an old woman — kills the film crew on her husband's farm because she was once beautiful and sexual and now isn't and she resents them for it. Wayne is killed. Bobby-Lynne and Jackson are killed. Maxine escapes. Pearl's origin story is told in the prequel Pearl.",
  "the black phone": "Finney is kidnapped by the Grabber. The ghosts of the Grabber's previous victims help him escape through the black phone on the wall. He breaks the Grabber's neck. His sister Gwen had psychic dreams that helped the police find him. He escapes.",
  "violent night": "Santa Claus is real, was a Viking, and is played by David Harbour. He kills the mercenaries who have taken a family hostage on Christmas Eve, assisted by a little girl who has been studying Home Alone. He gives the father coal. He flies away.",
  "the northman": "Amleth kills Fjölnir — his uncle who murdered his father — but only after getting his mother back and discovering she orchestrated the murder herself. He kills his mother too. He and Olga's children survive. He and Fjölnir kill each other in a volcano.",

  // --- MORE TV SHOWS ---
  "the white lotus season 1": "Armond the hotel manager dies — killed by Shane Patton, who he'd been tormenting and who finds him stealing from the safe. Armond had relapsed on drugs throughout. The body is shipped home in the urn that was meant for Nicole Mossbacher's mother's ashes.",
  "the bear season 2": "The restaurant is renamed The Bear and transformed for opening. Episode 6 — Fishes — is a single Christmas dinner from years ago that explains everything about the family. The finale shows opening night, which is a disaster. Carmy locks himself in the walk-in.",
  "the bear season 3": "The Bear has its Michelin star review. The team fractures further. Carmy's relationship with Claire is definitively over. The restaurant may not survive. The season ends on ambiguity about whether any of this was worth it.",
  "abbott elementary": "The teachers of Abbott Elementary survive another school year despite chronic underfunding. Janine and Gregory finally get together in season 3. Ava is chaotic and secretly competent. It's the best workplace comedy since The Office.",
  "the last of us season 1": "Joel lies to Ellie. He kills the Firefly doctors to save her rather than let them use her brain for a vaccine. Ellie discovers the truth gradually. Tess dies early. Henry and Sam die. Bill and Frank's episode is a standalone masterpiece.",
  "house of the dragon": "Lucerys Velaryon is killed by Aemond Targaryen riding Vhagar over the sea. This begins the Dance of the Dragons. Vaemond Velaryon is killed by Daemon. The king Viserys dies. Rhaenyra is briefly queen before everything collapses.",
  "andor 2022": "Same as Andor. Cassian becomes a rebel. Maarva's speech. Luthen's sacrifice.",
  "the rings of power": "Sauron was Halbrand — the man who rode with Galadriel to Númenor and advised the Elven smiths on crafting the rings of power. Three rings are made for the Elves. Mordor is created when Mount Doom erupts. The Stranger is a wizard — possibly Gandalf.",
  "house of cards season 1": "Frank Underwood engineers his own rise to Secretary of State and then Vice President through Machiavellian manipulation including pushing Peter Russo in front of a train.",
  "true detective season 4": "The night country investigation leads to a cave system where the scientists were killed by the local indigenous women who had been abused and exploited. Danvers's stepson Peter kills his own father Ted. Navarro walks into the ice and disappears. The spiral is everywhere.",
  "the terror season 2": "Japanese-American internment during WWII. A supernatural creature haunts the camp. Chester is marked by the creature after surviving its previous host. The creature is vanquished. Chester and his family are destroyed by the American government regardless.",
  "severance season 2": "Mark discovers more about Lumon's true nature and his wife Gemma. The innies gain more autonomy and more danger. The show remains one of the most formally audacious things on television.",
  "slow horses": "Jackson Lamb's team of disgraced MI5 agents keep stumbling into genuine threats. Slough House is always expendable and always survives. River Cartwright's grandfather is revealed to be a traitor. Someone always dies. Lamb is always eating something disgusting.",
